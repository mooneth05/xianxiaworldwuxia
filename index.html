  "5-9": `幻境術の本を手に入れたのは偶然だった。\n\n古書店の奥の棚、埃をかぶった中に紛れていた。本のタイトルは「上古幻霊術概論」。前世のニエ・リーが三十代で習得した技術の原書だ。まさかこんなところで入手できるとは思っていなかった。\n\n値段を聞いた。古くて状態が悪いという理由で格安だった。書店主には何が書いてあるか分からなかったのだろう。ニエ・リーは表情を変えずに購入した。\n\n部屋に戻って読み始めた。内容は前世で知っているものと八割一致している。残りの二割が、前世では失われていた部分だ。完全版が残っていたのか。\n\n幻境術は攻撃技術ではなく、欺瞞と情報収集のための術だ。実戦でも有効だが、最大の効果は戦略レベルで発揮される。この術を十三歳で習得すれば、次の十年の計画に大きな余裕が生まれる。彼は丁寧に、しかし確実に習得を始めた。`,

  "6-10": `霊草の正体は「天地種」というものだった。\n\n荀儿が三日かけて古い文献から見つけ出した。万年に一度だけ実り、服用すると修行者の資質そのものを変質させる、伝説上の植物だ。「存在するとは思っていなかった」荀儿は言った。「でも文献の特徴と完全に一致する」リン・ミンは鉢の発光する芽を見た。「これをどうすべきか」「服用するなら今ではない。完全に成長してから。時期を誤ると効果が半減する」「どのくらいかかる」「文献では一年から三年。条件次第」リン・ミンは頷いた。そういうことか。立方体の欠片は長期的な計画を持っている。一年から三年、この草を育てながら基礎を固める。その後、天地種が完成した時に服用する。「秘密は守れるか」「当然」荀儿は言った。「ただし私は経過を観察したい」「一緒に育てよう」これが、二人の秘密の共同作業の始まりだった。`,

  "6-6": `荀儿との修行は週に三回の習慣になった。\n\n正式な師弟関係ではない。ただ互いの修行を見ながら意見を言い合う。荀儿は攻撃系の霊術が得意で、リン・ミンの近接戦闘と組み合わせると練習の幅が広がった。\n\n「立方体の欠片は今も活動しているか」ある日、荀儿が聞いた。リン・ミンは驚いた。「なぜ知っている」「あなたの修行を見ていれば分かる。外部から指示されているような動きをする時がある」「気づかれていたか」「私の観察眼は売りなので」荀儿は淡々と言った。「秘密にしておく。ただし一つ聞かせて。その欠片は何のためにあなたを鍛えているの」リン・ミンは考えた。「まだ分からない。ただ方向性は見えてきた。普通の修行者ではなく、何か別のものになるために鍛えている気がする」「別のもの」「そう。まだ言葉にできないけれど」荀儿は頷いた。「分かったら教えて」「もちろん」`,

  "6-7": `宗派の対外試合の結果は、リン・ミンを予想外の立場に置いた。\n\n勝利そのものより、勝ち方が問題だった。霊力で格下の相手が体術だけで上位修行者を倒したという事実は、宗派内でも大きな話題になった。良い意味でも悪い意味でも。\n\n「弟子にならないか」上級師範の一人が声をかけてきた。リン・ミンは慎重に答えた。「今は独自の方法で修行しています。師範についた場合、そのやり方を続けられますか」「それは……普通、弟子は師匠の方法に従うものだが」「では今は難しいです」「なぜ自分の方法にこだわる」リン・ミンは少し考えた。「師匠がいない間に体が覚えた道があります。それを途中で変えると、積み上げてきたものが崩れる気がして」師範は複雑な顔をした。「珍しい修行者だ」それ以上は言わなかった。勧誘は断られた形だが、師範の目には確かな評価の光があった。`,

  "6-8": `立方体の欠片が初めて明確な「指示」を出したのは、リン・ミンが十六歳の時だった。\n\n通常は感覚的なフィードバックしか来ない。しかしその夜、丹田の奥から言葉に近いものが届いた。「北の渓谷へ」具体的な場所の指示。リン・ミンは翌朝、宗派の許可を取り北の渓谷へ向かった。\n\n渓谷は修行者に知られた場所ではない。霊力の密度が低く、修行の場としては向かない。しかし欠片は確かにここを指していた。\n\n渓谷の底、岩と岩の間に小さな洞があった。中に入った。狭い空間の奥に、石で封じられた場所がある。石を退かすと、下に小さな空間があった。そこに古い壺がある。壺の中に、種のようなものが一つ。\n\n欠片が反応した。これを持ち帰れ、という感覚。リン・ミンは種を大切に包んで持ち帰った。何の種かは分からない。しかし重要なものだということは、欠片の反応から明らかだった。`,

  "6-9": `種を植えて三日後、光った。\n\n宿舎の鉢に土を入れて植えた。水を与えて普通に管理していたら、三日目の深夜に鉢が光り始めた。青白い光。霊力を帯びた光だ。\n\n翌朝、芽が出ていた。普通の芽ではない。葉の先端が発光している。荀儿が見て目を丸くした。「これは……霊草？　でも私が知っている霊草とは違う」「北の渓谷で見つけた」「どんな渓谷」「欠片が教えてくれた場所」荀儿はしばらく発光する芽を見つめた。「宗派の薬師に見せた方がいい。鑑定してもらわないと」「それは少し待ちたい。正体が分かる前に公開したくない」「なぜ」「欲しがる人間が出る。正体が分かってから自分で判断したい」荀儿は頷いた。「では私が文献を調べる。心当たりがないわけでもないから」`,

  "7-10": `宗派内での立場が、少しずつ変わってきた。\n\n最初は「普通の子」として扱われていたのが、様々な出来事を通じて「変わった子」という評価に変わった。特別扱いではない。ただ目につくようになった。\n\n雲澈はこの変化を歓迎しなかった。目立つことは計画の妨げになる。しかし完全に隠れ続けることも難しい。\n\n解決策として、彼は「わかりやすい弱点を作ること」を選んだ。計算と理論は得意だが、特定の実技が苦手、というキャラクターを設定した。一度定着したイメージは、人を安心させる。\n\n「炎系の術が苦手なんだ」と言い始めた。確かに炎は元々あまり使わない系統だ。完全な嘘ではない。しかしこれによって、他の強さが「意外性」になる。意外性は、隠れるより効果的な時がある。于無涯だけが時々、見透かすような目をした。しかし何も言わなかった。`,

  "7-6": `青雲宗での生活が安定してきた頃、雲澈は意図的に「普通の問題児」を演じ始めた。\n\n才能は見せすぎず、かといって完全に隠しもしない。規則は守るが、効率を求めすぎない。時々、同年代らしい失敗をする。完璧すぎる子供は不審に思われる。\n\n師範の于無涯だけは違った。彼は雲澈を見て、何かを感じている様子だ。毎週一度、師範は雲澈と個人的な会話の時間を作った。修行についての指導と言いながら、実際は様子を見ているのだと雲澈には分かった。\n\n「宗派の外に出たことはあるか」ある日、于無涯が聞いた。「まだありません」「いつか機会があれば、東の山脈へ行きなさい。そこには一人の老修行者がいる。私の師でもあった人だ」「どんな方ですか」「言葉では説明できない。ただ、お前のような者には会う価値がある」雲澈は頷いた。東の山脈。その場所は前世の記憶にも存在する。しかし行く時期はまだではない。情報として蓄積して、いつか使う。`,

  "7-7": `内功の突破は予定より二ヶ月遅れた。\n\n原因は分かっていた。体が若い。前世では成人した体で同じ段階を越えたが、今世では十三歳の体だ。霊力の容量が違う。土台が同じでも、器が違えば積み上がる速度も変わる。\n\n雲澈は戦略を修正した。速度より安定性を優先する。前世で学んだ最大の失敗は、基礎が脆いまま高みを目指したことだ。今世ではその繰り返しはしない。\n\n突破した夜、天毒珠が強く反応した。雲澈の霊力が新しい段階に入ったことを、珠が認識したらしい。体内で温かな感覚が広がった。前世では苦しかった突破の瞬間が、今世では心地よかった。基礎がしっかりしていれば、突破は自然に起きる。\n\n「よかった」雲澈は静かに言った。宿舎の窓から夜空を見上げた。前世で見た同じ星だろうか。時代が違えば、星の配置も微妙に異なる。しかし空は変わらない。`,

  "7-8": `初めての本格的な戦いは、修行の演習ではなかった。\n\n宗派の山中で薬草を採集していた時、二人の外部の修行者が現れた。見た目は旅人だが、霊力の気配が剣呑だ。「その薬草を全部置いていけ」要求は明快だった。強盗だ。\n\n雲澈は手持ちの薬草を見た。三時間かけて集めたものだ。「断る」相手は驚いた。子供が断った。「もう一度言う機会をやろう」「必要ない」\n\n戦闘が始まった。相手は二人とも四段の修行者。雲澈は現在三段の下段。数字上は不利だ。しかし前世の戦闘経験は、段位に収まらない。\n\n六十秒後、二人は地面に座っていた。雲澈の圧勝だった。技術ではなく、動き方そのものが違った。どこに力があるかを知っている者と、力任せに戦う者の差だ。「子供に……」相手の一人が呟いた。「段位は参考に過ぎない」雲澈は薬草を拾い直した。「怪我がなくてよかった。帰りなさい」`,

  "7-9": `于無涯が試練を課したのは、雲澈が宗派に入って半年後だった。\n\n「一人で三日間、山の中で生き延びること。霊力使用可。ただし師範への連絡禁止」条件はシンプルだ。他の同年代の弟子には課さない特別課題だ。\n\n雲澈は三日間、山の中で過ごした。食料は自分で確保した。水は川から。夜は岩陰で。魔獣には三度遭遇した。最初の二頭は回避した。三頭目は避けられない位置だったので、最小限の力で撃退した。\n\n三日目の夕方、宗派に戻った。于無涯が待っていた。「どうだった」「問題ありませんでした」「どこが一番難しかった」「二日目の夜、雨が降った時です。乾いた場所を見つけるのに時間がかかりました」于無涯は少し笑った。「魔獣はどうした」「三頭と遭遇しました。二頭は回避、一頭は無力化」「一頭も倒さなかったのか」「必要がなかったので」于無涯は頷いた。必要のないことをしない。それが前世の経験から来る判断だということを、彼は知らない。`,

  "8-10": `林雷が最初の大規模な魔法陣を完成させたのは、エルンスト学院の二年生の春だった。\n\n練習場の床いっぱいに描いた「風域展開陣」。風属性の魔力を広範囲に展開し、範囲内の気流を操る複合魔法陣だ。ドーリングの指導のもと、三週間かけて設計し、五日かけて描いた。\n\n魔力を流し込んだ瞬間、練習場全体の空気が動いた。精密にコントロールされた気流が、陣の設計通りに動いている。ドーリングが笑った。指輪の中から、珍しいことだ。\n\n翌日、練習場を管理する師範が不思議そうに床を調べていた。「誰かが陣を描いた。しかし消してある。しかしこれは……」師範は模様の痕跡を指でなぞった。「複合陣だ。しかし誰が……」林雷は遠くから見ていた。バレてはいない。痕跡を残したのは意図的だ。誰かの目に触れることで、「こういう修行者がいる」という事実だけを残す。名前は必要ない。実績が積み上がれば、いつか自然と繋がる時が来る。`,

  "8-6": `魔法の基礎訓練で、林雷は最初のランクを上げた。\n\n風属性の魔法師として登録されているが、ドーリングとの修行では火、水、土の属性も練習している。表向きは一属性専門だが、実際には四属性の基礎を積んでいる。\n\nこれがバレると厄介だ。マルチ属性の魔法師は希少で、すぐに注目を集める。今はまだその時ではない。\n\n「どのくらい隠し続けるつもりだ」ドーリングが聞いた。「必要な準備が整うまで」「いつ整う」「まだ分からない。でも感覚として、今は潜む時期だ」「お前は子供の割に戦略的だな」「先のことを考えることが好きなのかもしれない」林雷は答えた。ドーリングの四千年の知恵と、林雷の十三歳の勘が、不思議と一致することが多かった。時代と年齢を超えた共鳴のようなものがある。`,

  "8-7": `エルンスト学院の図書室で、林雷は一人の同級生と知り合った。\n\n名前はユーラ。金髪で、常に本を持ち歩いている。彼女が読む本の種類が興味深かった。修行理論ではなく、主に歴史と地理の本だ。\n\n「なぜ歴史を？」林雷は聞いた。「過去を知らないと、現在が見えないから」「修行者の歴史？」「人間の歴史。修行者だけじゃない。普通の人間の歴史の方が、実は参考になることが多い」林雷は考えた。珍しい視点だ。\n\n「竜血戦士の歴史は？」ユーラは顔を上げた。「バルーク家の？　少し知っているけど。なぜ？」「少し知りたくて」ユーラは本を閉じた。「バルーク家は三代前まで、この地域の守護を担っていた家系だ。衰退した理由は記録では財政難となっているが、実際は別の理由があったという説もある」「どんな説」「竜血の覚醒を恐れた者たちによる意図的な弱体化」林雷は黙っていた。ドーリングから聞いた話と一致する部分があった。`,

  "8-8": `家族からの手紙が月に一度届く。\n\n父の手紙はいつも短い。母は長い。弟はまだ小さいので代わりに父が近況を伝えてくれる。バルーク家の財政は相変わらず厳しいが、父は「お前のことだけを心配している」と書いた。\n\n林雷は返事を書いた。「学院での生活は問題ない。魔法の訓練も順調だ」これは半分本当で半分嘘だ。問題はないが、それは林雷が一般的な「順調」とは異なる道を歩いているためだ。\n\nドーリングが言った。「家族のことを考えながら修行すると、集中力が散漫になる修行者が多い」「私はそうならない」「なぜ」「家族のために、という意識があるから集中できる。動機と集中は反比例じゃなくて比例する」ドーリングは少し間を置いた。「面白い視点だ。四千年で初めて聞いた考え方だ」「本当に？」「お前は時々、私が知らないことを知っている。矛盾しているようだが」林雷は笑った。「そうかもしれない」`,

  "8-9": `学院の試験期間、林雷は珍しく緊張した。\n\n実技試験ではなく、筆記試験だ。魔法理論の応用問題。表向きの設定では「風属性専門の普通の生徒」だが、解答用紙に書く内容には注意が必要だ。知識を持ちすぎていることがバレないように、かつ合格ラインは確実に超えなければならない。\n\n「どう解く」ドーリングが指輪の中から言った。「問題を見せろ」「試験中は話しかけないでください」「すまん」林雷は一人で考えた。この問題の模範解答は分かる。しかし模範解答を完璧に書くと、習っていないはずの内容が含まれることになる。三番の問題だ。あえて一箇所、小さな「見落とし」を入れておく。\n\n試験が終わった後、ユーラが隣に来た。「三番の最後の計算、惜しかったね」「そうだった？」「見直せば気づいたのに」「確かに」林雷は頷いた。完璧な失点の演出は、完璧な成功より難しい。`,

  "9-10": `薬老が初めて自分の過去を話したのは、シャオ・ヤンとの修行が八ヶ月を過ぎた頃だった。\n\n「かつて、私にも弟子がいた」夜の修行の後、突然そう言い始めた。シャオ・ヤンは黙って聞いた。「才能があった。私が教えたことを全て吸収した。しかし焦り過ぎた。早く強くなりたいという気持ちが、判断を狂わせた」「どうなったのですか」「私が止める前に、限界を超えた修行をした。体が壊れた」長い沈黙。「だから私は急かさない」「薬老が厳しいのはそのためですか」「厳しくても、間違った方向では厳しくない。それが私の反省から来ている」シャオ・ヤンは頷いた。指輪の中の老人が、初めて人間らしく見えた。「分かりました。急ぎません」「良い返事だ」薬老の声に、珍しく温もりがあった。`,

  "9-8": `シャオ・ヤンの修行は静かに、しかし着実に進んでいた。\n\n薬老の指導のもと、霊力の作り直しは四ヶ月目を迎えた。新しく構築された霊力の流れは、以前のものとは質が根本的に違う。以前は量を追っていた。今は密度を追っている。\n\n「試してみろ」薬老が言った。「何を」「外の修行者と比べてみろ。霊力量では負けるだろう。しかし戦ってみれば分かることがある」次の日、シャオ・ヤンは弟の修行仲間の一人に声をかけた。「少し稽古をつけてくれないか」相手は笑った。力を失ったシャオ・ヤンに稽古を頼まれた形だ。しかしやってみれば分かる。試合は三十秒で終わった。相手が面食らった顔をしていた。「霊力が少ないはずなのに、なぜ」「少ない方が、使い方が上手くなる」シャオ・ヤンは答えた。`,

  "9-9": `ある朝、父が部屋を訪ねてきた。\n\n珍しいことだ。父はいつも忙しく、子供の部屋に来ることはほとんどない。「少し話がしたい」彼は言った。二人は縁側に座った。「お前が最近、変わってきた気がする」「そうですか」「以前は焦りを顔に出していた。今は落ち着いている」「修行の方向が定まってきたので」「力は戻りそうか」シャオ・ヤンは少し考えた。正直に答えることにした。「戻るというより、作り直しています。以前のものより良いものが出来ると思います」父は長い間黙っていた。「信じていいか」「はい」父はシャオ・ヤンの肩に手を置いた。言葉はない。それだけで十分だった。シャオ・ヤンは初めて、家族の信頼の重みを感じた。大切にしなければ、という思いが新たに湧いた。`,

  "10-6": `タン・サンが七怪学院への移籍を決めた後、青霊学院の師範たちとの別れの挨拶が始まった。\n\n担任は手紙を一通渡してきた。「七怪学院の入学審査委員長への推薦状だ。お前の意志力と判断力を書いた」「ありがとうございます」「一つだけ言っておく。七怪学院は競争が激しい。潰される者も多い」「分かっています」「なぜ分かる？　行ったことがないだろう」タン・サンは少し考えた。「想像できます。競争が激しい場所ほど、落ち着いて動ける者が強い」担任は笑った。「そう信じて動きなさい」シャオ・ウーとの別れは言葉が少なかった。「一緒に行くんだから、別れじゃないけど」彼女は言った。「そうだね」「でも青霊学院でのことは大事にしたい」「もちろん」二人は翌朝、学院を出た。新しい場所へ。準備は整っている。`,

  "10-7": `七怪学院への道は三日かかった。\n\nタン・サンとシャオ・ウーは旅の間、ほとんど歩いていた。乗り物を使う財力はない。しかし歩くことに不満はなかった。道中の景色を見ながら、二人は多くのことを話した。\n\n「どんな学院だと思う？」シャオ・ウーが聞いた。「実力主義だと聞いている。入学後も定期的に選抜があって、結果によっては退学になる」「怖い」「でも逆に言えば、実力があれば認められる」「あなたなら大丈夫だと思う」「シャオ・ウーもそうだ」彼女は少し考えた。「私の武魂は……まだ怖い人がいると思う」「最初はそうかもしれない。でも実力を示せば変わる」「そう信じる？」「信じている。人は成果を見て変わる場合が多い」夕暮れ時、丘の上から遠くに七怪学院の建物が見えた。思っていたより大きかった。シャオ・ウーは息を呑んだ。タン・サンは静かに頷いた。ここから、本当の始まりだ。`,

  "11-6": `東の研究宗派「玄知館」への入館試験は、書類審査と実技の二段階だった。\n\n書類審査では修行履歴と基礎知識を問う筆記試験がある。イー・ユンは筆記試験で慎重に回答した。知識は十分すぎるほどある。しかし全て正解すると怪しまれる。意図的に二問だけ外した。\n\n実技は基礎の修行術の演練だ。強さを見るのではなく、正確さを見る。これは得意だ。正確に、丁寧に。余分な力を使わず、必要なだけ使う。\n\n審査の結果は翌日出た。合格。評価欄には「基礎の完成度が高い。実力以上に将来性を感じる」と書かれていた。後者の評価が本音だろう。修行者として突出しているわけではないが、何かある、と感じさせる何かが出ているらしい。それはおそらく、前世の経験から来る「落ち着き」だ。どんな状況でも焦らない者は、長い目で見ると伸びる。審査員はそれを直感していたのかもしれない。`,

  "11-7": `玄知館での最初の一ヶ月は、予想より快適だった。\n\n研究宗派という名の通り、ここの修行者は探求心が強い。力を示すより、理解を深めることに価値を置く文化だ。イー・ユンにとっては非常に過ごしやすい環境だ。\n\n同室の者は二人いる。一人は理論型の修行者で、毎晩文献を読んでいる。もう一人は実験が好きで、小さな錬成を繰り返している。どちらも純粋に修行を楽しんでいる。前世での経験から言えば、こういう環境は珍しい。大抵は競争と嫉妬が渦巻いている。\n\n「どの分野を専攻する？」理論型の同室者、チェン・ルイが聞いた。「修行術の基礎理論と、古代史を組み合わせたい」「面白い組み合わせだ。古代史は役に立つの？」「過去の修行術には、今より優れた部分がある場合がある。それを現代で応用できれば価値がある」チェン・ルイは目を輝かせた。「それは私も興味がある。一緒に研究しない？」イー・ユンは頷いた。良い仲間が見つかった。`,

  "12-6": `副学長との面談は、思っていたより長かった。\n\n「その解法はどこで」「自分で導きました」「どこで学んだ基礎を元に？」「北方霊院の標準課程と、独自の試行錯誤です」副学長はしばらく考えた。「北方霊院の出身者なら、ある程度の基礎は保証されている。しかし標準課程からあの解法は出ない」「ならば独自の部分が多いということでしょうか」「正直に言えば、その解法は三十年前に別の研究者が論文として発表したものに近い。その論文を読んだか」「読んでいません」「私はそれを信じる。なぜなら、お前のやり方は独立した発想から来ている。同じ結論に別の道から到達した」ムー・チェンは黙って聞いていた。「才能は認める。しかし一つ聞く。北方霊院を追放された理由は何だ」「派閥間の対立の結果です」「自分に非はなかったか」「最善を尽くしましたが、力が及びませんでした」副学長は頷いた。「正直な答えだ。北嶺学院でしっかり力をつけなさい」`,

  "12-7": `ムー・チェンが初めて上位の先輩に認められたのは、偶然の助けがきっかけだった。\n\n図書室で、上級生が複雑な霊力陣の計算に行き詰まっていた。四時間悩んでいる様子だった。ムー・チェンは通りかかった時、問題を見た。解けた。黙って通り過ぎようとした。\n\nしかし足が止まった。助けることのメリットとデメリットを考えた。目立つことへのリスクがある。しかし副学長との面談以来、少しずつ表に出ることを許可し始めている。\n\n「少し見てもいいですか」上級生は不機嫌そうに振り返った。「下級生に何が分かる」「分からなければ邪魔しません」上級生は問題用紙を見せた。ムー・チェンは五分で解いた。「この部分の展開を別の手順でやると、三段階省略できます」上級生は解答を見た。正しかった。「なぜ分かった」「似た問題を自分で解いたことがあったので」上級生は黙って考えた。「名前は」「ムー・チェンです。一年生です」「一年生か」この出会いが、学院内での立場を少しずつ変えていくことになる。`,

  "1-3": `龍陳は図書館の古い棚の前に立ち、指を一冊の薄い書物の背に滑らせた。表紙には「初歩霊術入門」とあった。前世の彼には不要な知識だった。だが今の彼には、舞台に戻るための道具が必要だった。

「何を探している？」背後から声がした。聖家の若者の一人が、仲間を二人連れて立っていた。顔には嘲笑が浮かんでいた。「霊力もないくせに本を読んでも無駄だろう」

龍陳は振り返らなかった。「君たちの家族が北の谷の採掘権を持っているのは知っている」彼は静かに言った。「半年後に何が起きるか教えようか？」

その問いの静けさが、侮辱の言葉よりも相手を不安にさせた。三人は顔を見合わせ、何も言わずに立ち去った。龍陳は本を棚に戻した。こんな程度の情報戦でさえ、まだ手加減が必要だった。本当の力を取り戻すまでの間、知恵だけが彼の武器だ。`,

  "1-4": `五日後、龍陳の霊海に二番目の星が灯った。

誰にも見えなかった。外から観察できるものは何もなかった。だが彼は自分の内側で、暗闇の中に輝くその光を感じた——前世では数十年かけて育てたものが、今生では五日で芽吹いた。積み重なった記憶は、近道を知っていた。

彼は聖地神院の外れ、誰も来ない古い訓練場で一人修行していた。薄明の中、汗が石畳に落ちる音だけが響く。動作は単純だった——外から見れば。だが一つひとつの呼吸に、一万年分の理解が込められていた。

「ここにいたの」

振り返ると、葉紫雲が門のところに立っていた。珍しいことに、彼女は追いかけてきた理由を説明しなかった。ただ腕を組んで彼の動作を見ていた。数分後、彼女は口を開いた。「型が間違っている」

龍陳は動きを止めた。「どこが？」

「膝の角度。そこから先、力が逃げている」

彼は少し驚いた。彼女の観察眼は前世でも優れていた——しかし彼がわざと崩した箇所を、この年齢で見抜くとは思っていなかった。「正しい」と彼は認めた。「気づいてくれてありがとう」

葉紫雲は何も言わなかった。しかし彼の隣で同じ動作を始めた。`,

  "1-5": `聖魂学院の試験は毎月末に行われる。その日、龍陳は学院の中庭に置かれた試験石の前に立った。試験石は霊力の質と量を測定する水晶の柱で、強く叩けば叩くほど高く光る仕組みだった。

「無霊のくせに来たのか」後列から誰かが笑った。

龍陳は気にしなかった。石の前に立ち、右手の指先を表面に触れさせた。内側で、九星覇体の術の第一段階が静かに展開する。前世では一瞬で行える操作だが、今の身体では慎重に、丁寧に。

光が灯った。

弱かった。銀色の光ではなく、白に近い薄い輝きが柱の下部を満たしただけだ。観衆の笑いが止まった——無霊の者が光を出したという事実に、笑いの理由を見つけられなくなったからだ。

試験官の葉墨老師が近づいてきた。彼の目に浮かんだ表情を、龍陳は前世でも知っていた。驚きではなく、注意深い観察の眼差しだ。

「放課後、私のところへ来なさい」老師は静かに言った。

龍陳はうなずいた。この会話を、彼は三ヶ月前から待っていた。`,

  "2-2": `意志力試験の結果が学院全体に広まったのは翌朝のことだった。

蘇宇は廊下を歩きながら、視線が自分に集まるのを感じた——隠された視線ではなく、むき出しの計算が込められた目だ。力の均衡が変わるとき、賢い者はいち早くそれを察知する。この学院には賢い者が多かった。

三年生の先輩が一人、彼の前に立ちはだかった。岩蜥蜴族の血を引く大柄な青年で、腕には自然霊紋が走っていた。「本当に500単位を超えたのか？」

「機械が止まったのは500の時です」蘇宇は答えた。「それ以上は計測していません」

「人間には不可能だ」

「昨日までは、そう思っていました」

沈黙が続いた。相手は彼の答えを嘘と決めつけることも、事実と認めることもできず、ただ立ち去った。蘇宇はその背中を見ながら、意志力がどれほど積み重ねられるものかを考えた。限界を信じることが、限界を作る。信じなければ——どこまで行けるのだろう。`,

  "2-3": `研究ノートの四十七ページ目に、蘇宇は仮説を書いた。

「人類の修行能力が低下したのは、才能の問題ではなく、方法論の断絶ではないか」

図書館の最も古い書架には、八百年以上前の古文書が収められていた。閲覧許可を取るのに二週間かかったが、それだけの価値があった。古文書の中に、人族がまだ諸族の上位に立っていた時代の修行記録が残っていたのだ。

現在の修行法との違いは明確だった。古代の人族は霊力を「蓄積するもの」として扱っていなかった——「流れるもの」として扱っていた。体内を流れる川のように、止めるのではなく、導く。

蘇宇は試験当日の自分の感覚を思い出した。意志力が高まったとき、彼の体内で何かが流れ始めた感覚があった。止まっていたものが動き出したような。

「やってみよう」彼はノートを閉じた。図書館の閲覧室は静かだった。誰も彼を見ていなかった。彼は呼吸を整え、意識を体の内側へ向けた。`,

  "2-4": `夜の修行は五回目になった。

蘇宇は寮の屋上に座り、星空の下で意識を内側に向けた。古代文書の修行法を再現しようとするたびに、体内で何かが反応した——霊力ではなく、もっと根本的な何か。意志そのものが物質に作用する感覚。

岩蜥蜴族の学生が屋上への階段を上がってきた。昼間に廊下で彼を止めた先輩ではなく、別の人物だった。同学年で、名前は宋偉という。

「こんな時間に何をしている？」宋偉は怪訝そうに聞いた。

「修行です」

「屋上で？霊力注入装置もないのに？」

「道具はいりません」蘇宇は答えた。「今やっているのは、道具で測れるものじゃないので」

宋偉は怪訝そうにしながらも、隣に座った。少しの間沈黙が続いた後、「俺にも教えてくれないか」と彼は言った。「測定不能な修行とやらを」

蘇宇は考えた。古代の方法はまだ不完全で、成果を保証できるものではない。しかし試みることに意味があるなら——一人でやるより、二人でやった方が早く答えが出るかもしれない。「一緒にやってみましょう」と彼は言った。`,

  "2-5": `一週間後、宋偉の意志力試験の値は120から310に跳ね上がった。

再試験は本人が申請したもので、学院側は渋々承諾した。結果が出たとき、試験官は三度確認した。機械を交換し、もう一度測った。数値は変わらなかった。

廊下で宋偉が蘇宇を見つけた時、その顔には笑いと困惑が混ざった表情が浮かんでいた。「何をした？」

「何もしていません」蘇宇は正直に答えた。「ただ、流し方を変えただけです」

「詳しく説明しろ」

「説明するより、もう少し自分で試した後の方がいいと思います」

宋偉は唇を結んだ。頭のいい人間が曖昧な答えを受け入れる時の顔——納得はしていないが、否定もできない時の顔だ。「次に何をすべきか教えてくれ」

蘇宇はノートのページを開いた。四十八ページ目には、先週書き加えた新しい仮説が並んでいた。「ここから始めましょう」`,

  "3-3": `栄光城の市場を歩きながら、李奇威は三つのことを同時に考えていた。

一つ目——この時代の霊石の質は、彼が最後にこの大陸を歩いた時よりも二段階低下している。千年の間に、主要な霊脈が三本枯渇したのだろう。

二つ目——東の商人街の区画は五十年後に壊滅的な火災に遭う。そこに店を持つ商人たちは、今から対策を始めれば間に合うかもしれない。間に合わせるべきか否かは、まだ判断していない。

三つ目——彼の現在の身体は、昨日より少しだけ強くなった。

三つ目が最も重要だった。

少年の体は最初から器が小さかった——家柄は名家だが修行の素質に乏しく、教師たちは早々に期待を諦めていた。しかし李奇威はそれを欠点とは思わなかった。空の器ほど、充たしやすい。

市場の外れに、古い書物を扱う老人の露店があった。李奇威はそこで足を止めた。棚の隅に、ほとんど字が消えかけた薄い本が置かれていた。彼は手に取り、数ページをめくった。

百銀で売ってくれ、と彼は言った。

老人は怪訝そうな顔をした。それは三銀の本だったから。`,

  "3-4": `書物の内容は断片的だった。解読できた部分だけを抜き出すと、おそらく千二百年前の修行者が残した覚書だった。完全な技法ではなく、思索の記録——試し、失敗し、気づきを書き留めたもの。

李奇威はそれを三時間で読み切った。

内容のほとんどは、彼が前世で通り過ぎた段階の話だった。しかし一節だけ、彼でさえ考えたことのない視点があった。「霊は量で競うな。質で刻め」という一文。

量——それは修行者が常に追い求めるものだ。より多くの霊力、より高い段階、より大きな器。しかし「質で刻む」とはどういう意味か？

李奇威は目を閉じ、自分の霊海を内観した。広大ではなかった——子供の体が持てる量は限られている。しかしその限られた量の中に、密度を変化させることができるとしたら？

翌朝、彼は三ページの覚書を書いた。書物の著者が気づかなかった続きを、彼は十分間の瞑想で補った。`,

  "3-5": `聖地学院の入学試験は三ヶ月後だった。

周囲の目には、李奇威の準備は最低限に見えていた。授業には出るが熱心ではなく、課外の修行にも参加しない。家の教師たちは溜息をついた——この子は諦めている、と彼らは思った。

実際には逆だった。

彼が学院の授業に出るのは、現代の修行論を観察するためだった。この時代の標準的な方法論がどれだけ非効率かを確認するためだ。課外修行に参加しないのは、他人と合わせる必要がないからだ。彼の修行は夜中に一人で行われ、外から見えるものは何もなかった。

三ヶ月で、彼の霊力は三段階上昇した。

数値だけを見れば普通に聞こえる。しかしその三段階の密度は、標準的な六段階分の実力に相当した。器が小さくても、中身が濃ければいい——書物の著者の言葉を、彼は自分なりに解釈していた。

試験前夜、李奇威は窓から星空を見上げた。かつて彼が立っていた高さから見た星と、今見る星は同じ星だ。距離が変わっただけだ。`,

  "4-3": `契約書の第三条には「依頼人の秘密保持」とあった。アーヴェスはそれを丁寧に読み、一つの文字を修正してから署名した。

ミラ・アシュヴェイルは修正箇所を確認した。「秘密保持の範囲を『業務上知り得た情報』から『業務遂行に必要な情報』に変更した。意味が逆になる」

「そうだ」アーヴェスは骸骨の手指を組み合わせた。「私は秘密を守ることには同意する。しかし、あなたが隠したい情報の中に、私が業務を遂行するために必要なものが含まれている場合は別だ。その場合は共有してもらう」

「それは私が決めることではないの？」

「いいえ。私が決める。私はリッチだ。雇われても、指示には従わない。助言と行動を提供する」

長い沈黙があった。ミラは窓の外を見た。骨の宮殿の窓から見える景色は、骨と霧と暗い空だけだった。不快ではない——ただ現実的だった。

「わかった」と彼女は言った。「でも一つ聞かせて。なぜ今、雇用者を募っているの？」

「力が必要だ」アーヴェスは答えた。「私の力だけでは足りないものが。今は足りない」

それが正直な答えだと、なぜかミラには分かった。`,

  "4-4": `最初の依頼は単純なものだった——書類の紛失。

正確には、グレイマントル協会の本部から消えた調査報告書を探すことだった。内部の誰かが持ち出したか、あるいは別の誰かが持ち込んだかのどちらかだ。ミラの本業はそういった「どちらか」を解明することだった。

アーヴェスは現場には行かなかった。骸骨のリッチが公共の建物を歩けば騒ぎになる。代わりに彼は骨の宮殿の書斎で、ミラが持ち帰った情報を分析した。

「書類は盗まれたのではない」彼は言った。「複製されたのだ」

「根拠は？」

「消えた書類が存在したとされる棚の配置。記録によれば左から三番目、下から二段目。しかしその位置は閲覧記録に残っていない。つまりその書類を読んだ者は、正規のルートを使っていない」

「それは盗難の証拠にもなる」

「本物の盗難なら、もっとうまくやる。あの協会には能力ある者がいるはずだ。これは急いでいた者の仕事だ——時間がなかったか、目的が限定的だったかのどちらかだ」

ミラはメモを取った。雇用者はリッチに頭脳を借りることができる。それは予想以上に実用的なことだった。`,

  "4-5": `複製された書類の目的が判明したのは五日後のことだった。

書類の内容は、北の森に眠る古代遺跡の座標だった。学術的な記録として協会に保管されていたが、実際には長年放置されていた情報だ。なぜ今、誰かがそれを必要としたのか。

「遺跡に何があるか知っているか？」ミラはアーヴェスに聞いた。

「古いものだ」アーヴェスは即座に答えた。そして少し間を置いてから付け加えた。「非常に古いものだ。私が知っているということは、四百年以上前から存在していたということだ」

「あなたが行ったことがある？」

「一度だけ。あの頃の私はまだ人間だった」骸骨の顔に表情はないが、その声に何かが滲んだ。「入れなかった。封印がかかっていた。当時の私の力では解除できなかった」

「今は？」

アーヴェスはゆっくりと立ち上がった。四百年分の思考が、一瞬で整理された。「今の私でも難しい。しかし——二人なら、話が変わるかもしれない」ミラは彼を見た。「それは依頼の範囲内？」「それは交渉の余地がある問題だ」`,

  "5-3": `聖女葉紫雲が聶離に話しかけたのは、彼が学院に戻って十日目のことだった。

理由は単純だった——彼女が見ているものを確認したかったのだ。

「あなたは変わった」廊下の角で、彼女は静かに言った。通りすぎる学生が二人、振り返った。聖家の令嬢が、落ちこぼれの聶離に声をかける——それ自体が異常だった。

「以前から変わらない部分もあります」聶離は答えた。

「いいえ」葉紫雲は首を振った。「昔のあなたは、私が話しかけると緊張した。今は違う」

聶離は少し黙った。彼女の観察力は前世でも一流だったが、今生ではさらに鋭いのかもしれない、と思った。あるいは彼が隠せていないだけか。

「何かを知っているの？」彼女は続けた。「答えなくていい。でも——あなたが知っていることの一部が、私たちにとっても重要なことだという気がする」

聶離は彼女を見た。前世では、この会話をするのに三年かかった。今生では十日で来た。「一つだけ聞きます」と彼は言った。「信じてもらえますか——証拠なしに？」

葉紫雲は少し考えた。「話を聞いてから判断する」

それで十分だった。`,

  "5-4": `魂獣の森に入るのは、学院の規則では十四歳以上の生徒に限られていた。

聶離は十三歳で、規則を知っていて、入った。

目的は単純だった——特定の魂獣の行動パターンを確認することだ。前世の記憶によれば、この森の北東に銀紋雪狼の群れがいる。群れのリーダーは三十年後に十段階を超える魂獣になる存在で、今は七段階程度のはずだ。七段階の魂獣と戦うことは今の彼には不可能だが——観察するだけなら別の話だ。

三時間歩いて、狼の群れを見つけた。

リーダーは予想より大きかった。聶離は三十メートル離れた木の上に静かに腰掛け、群れの動きを記録した。狼たちは彼の存在に気づいていた——だが攻撃しなかった。

なぜか。

魂の力の匂い、と聶離は考えた。彼の魂の力は今は微弱だが、前世で培った「質」がある。それが、ある種の魂獣に対して「危険」のシグナルを発しているのかもしれない。

記録を終えて帰ろうとしたとき、後ろから足音がした。振り返ると、葉紫雲が立っていた。

「規則違反よ」と彼女は言った。

「あなたもです」と彼は返した。`,

  "5-5": `雪がちらつく夕方、聶離は葉墨老師の書斎を訪れた。

約束の時間より少し早かった。老師はすでに待っていた——書斎の椅子に座り、何かを考える顔で。聶離が入ると、老師は彼に向き直った。

「座りなさい」

聶離は座った。

「何者だ」老師は単刀直入に言った。「お前は」

「聶家の子です」

「それは答えではない」

しばらく静寂が続いた。聶離は老師の目を見た。前世でも、この目は嘘を見抜いた。

「前世の記憶があります」聶離は静かに言った。嘘をつくことはできた。しかしこの人物に嘘をつくことは、戦略的に正しくなかった。「どれだけ生きたかは言えません。ただ——この世界がどこに向かうかを、ある程度知っています」

老師は長い間黙っていた。

「証明できるか？」

「半年待ってください」聶離は答えた。「北の山脈で何が起きるか、先にお伝えします。半年後に確認できるはずです」

老師は立ち上がり、窓の外を見た。「それが本当なら——お前をどう教えればいいのか分からんな」

「私が教える側になれるかもしれません」聶離は静かに言った。老師は振り返り、初めて笑った。`,

  "6-3": `立方体の欠片が林明に何をしたのか、彼が初めて正確に理解したのは、三週間後のことだった。

それは記憶ではなかった。知識でも、技術の伝授でもなかった。欠片がしたことは——観察だった。林明の体のすべての動作を、その根本から観察し、記録し、フィードバックとして返してくる。鏡のようなもの。ただし鏡は「今の自分」を映すが、欠片が見せるのは「あるべき自分」だった。

彼はその日の訓練で、三つの基本技法をゼロから再構築した。

外から見れば同じ動作だった。しかし内側は根本的に違った。以前は「習ったから」動いていた。今は「理解したから」動いていた。

銀羽の女弟子——林暁通という名だと後で知った——は訓練場の端から彼を観察していた。昨日と同じ場所に同じように立って、同じように見ていた。

「昨日より良くなった」彼女は言った。

「何が変わったか分かりますか？」林明は聞いた。

彼女は少し考えた。「外見は変わっていない。でも——動きに迷いがなくなった。判断が速くなった」

「正解です」林明は答えた。「理由が分かりますか？」

「分からない」素直な答えだった。「だから明日も見に来る」`,

  "6-4": `段階試験の日、林明は三級の試験を受けた。

本来ならまだ二級の途中のはずだった。申請したとき、試験官は眉をひそめた。「三級には霊力の最低基準がある。君の記録では到達していない」

「基準を超えています」林明は言った。「確認してください」

測定の結果、数値は基準を上回っていた。試験官は二度測り直した。三度目には別の機械を持ってきた。それでも同じ結果だった。

三級試験の内容は実戦形式だった——同段階の弟子との模擬戦が三試合。林明は最初の二試合を接戦で勝ち、三試合目をあっさり負けた。三試合目の相手は突出した素質の持ち主で、欠片からのフィードバックが「現時点では勝てない」と示していた。その通りだった。

試験後、林暁通が待っていた。「三試合目は何故負けた？」

「力が足りなかった」

「でも戦い方は完璧に近かった。本来なら惜しかった」

「本来ならそうです」林明は答えた。「ただ、今回の目的は勝つことではなかった。学ぶことでした」

彼女は首を傾げた。「三試合目の相手から何を学んだの？」

「六ヶ月後に超えるための、具体的な課題です」`,

  "6-5": `欠片が初めて「意図」を示したのは、四ヶ月目の夜だった。

林明は修行室で一人、呼吸を整えていた。深夜で、廊下は静かだった。欠片は通常、動作への反応としてフィードバックを返す——しかしその夜、彼が何もしていない状態で、欠片が何かを送ってきた。

感覚ではなく、方向感覚だった。

東。山の方向。距離は分からなかった。

林明は五分間座ったまま考えた。これは行くべきか。欠片は今まで一度も彼を危険な方向に誘導したことはなかった。しかし確信もなかった。

彼は起き上がり、修行着のまま外に出た。

山道を一時間歩いた。道の途中で林暁通に出会った——彼女もまた、何かに引かれるように歩いていた。

「あなたも？」と彼女は言った。

「感じましたか？」

「方向だけ。何があるかは分からない」

二人で歩き続けた。夜明け前、岩の割れ目の奥に、薄く光る何かを見つけた。鉱石ではなかった。霊脈の断片でもなかった。それは——また別の欠片だった。

林明は振り返った。「あなたのですか？」

林暁通は首を振った。「でも——呼ばれた気がした」

欠片は二つになった。`,

  "7-3": `天空毒珠の声を、雲澈が初めて聞いたのは転生から十日後だった。

声というより感覚だった——静かで、冷たく、しかし敵対的ではない。珠が発するシグナルを、彼の意識が言語として解釈している、というのが正確なところだろう。

「何を望む？」彼は内側に向けて問いかけた。

応答は即座だった——方向性。ある場所への。

「急ぐ必要はない」彼は答えた。「今の私の体では行けない場所だ。力をつけてから行く」

珠は沈黙した。同意とも反論とも取れる沈黙だった。

雲澈は瞑想を解いて窓を開けた。外は朝の空気で、鳥の声がした。この大陸を歩くのは、今の記憶では初めてだ——しかし別の意味では、何千回も歩いた場所でもある。大陸は変わらない。変わるのは人だ。

彼が変えるのは——この大陸で起きるはずの歴史だ。

裏切った者たちへの復讐を、彼は急いでいなかった。急ぐ者は判断を誤る。彼がやることは一つずつ、確実に。最初の一歩は、基礎を作り直すことだった。`,

  "7-4": `新月profound宮の入学試験は、この地域では唯一、人族と他族が同じ条件で競う場だった。

雲澈は試験の三日前に街に着いた。観察のためだ。試験会場の配置、試験官の顔ぶれ、他の受験者の傾向。情報は力だ——特に、今の彼のように身体の力がまだ十分でない時には。

観察中、一人の少年に気づいた。十四歳前後、痩せた体格、目だけが妙に鋭かった。一人で路地の隅に座り、木に向かって小石を投げていた——正確に、同じ場所に、繰り返し。力の制御の練習だ。

「受験者か？」雲澈は声をかけた。

少年は振り返り、雲澈を値踏みした。「そうだ。お前は？」

「同じだ。何族だ？」

「人族」少年は言った。少し身構えるように。「問題あるか？」

「ない」雲澈は隣に腰を下ろした。「ここ三日で人族の受験者を五人見たが、全員明日には諦めて帰る顔をしていた。お前だけ違う」

少年は少し沈黙してから言った。「お前もか？」

「私も人族だ」

初めて、少年の顔に何かが緩んだ。`,

  "7-5": `試験は三つの段階で構成されていた。

第一段——身体能力の測定。雲澈は今の体の限界で無難に通過した。突出した結果ではなかったが、落第ラインからは十分に上だった。

第二段——霊力の質の測定。ここで彼は慎重だった。天空毒珠を持つ体の霊力は、測定機に異常な反応を示す可能性があった。珠を完全に抑制した状態で測定を受けた。結果は平均的だった。

第三段——実戦形式の試験。受験者同士が対戦し、三勝した者が通過する。

雲澈は最初の二戦を勝った。手の内を見せすぎないよう、最小限の技だけを使って。三戦目の相手は宮の中でも注目されていた受験者で、年齢の割に実力が高かった。

その戦いを、雲澈は負けた。

意図的に。

合格ラインの二勝は達成した。そして三戦目の相手には、彼の真の実力を見せなかった。宮に入るのは始まりに過ぎない。ここから先、どれだけ見えていないかが大切だ。

路地の少年——名は嵐天と言った——は二勝二敗で通過した。宮への道を歩きながら、「なぜ最後は負けた？」と彼は聞いた。雲澈は笑った。「勝ちすぎると目立つ」`,

  "8-3": `エルンスト学院の第一週が終わった。

林磊はその夜、寮の窓から中庭を見下ろしながら、一週間分の情報を整理した。学院の構造、教師の専門分野、同学年の学生の傾向、使用可能な施設と時間帯。情報の収集は修行と同じくらい重要だと、ドゥーリン老師から最初に教わったことだ。

「整理したか？」老師の声が指輪から聞こえた。

「だいたい」林磊は答えた。「一つ気になることがある」

「言ってみなさい」

「魔法の授業で、教師が基礎理論を三回繰り返して教えた。最初の説明と三回目の説明が微妙に違っていた」

短い沈黙があった。「どう違った？」

「最初は『霊力は蓄積するもの』と言った。三回目は『霊力は流れるもの』と言った。本人は気づいていなかったと思う」

「どちらが正しいと思う？」

林磊は考えた。「両方正しいと思う。どちらの視点で見るかで、使い方が変わる」

「良い」老師は言った。「明日の授業で、その視点を持ってもう一度聞きなさい。違うものが見える」`,

  "8-4": `風の魔法師として知られる少年、レイ・バーナードが林磊の前に現れたのは入学から二週間後のことだった。

彼は学院の中でも才能で注目される存在だった——風属性の魔法師として、その緻密な制御は学年で一番と言われていた。なぜ林磊に声をかけてきたのか、最初は分からなかった。

「龍血戦士の末裔か」レイは言った。馬鹿にしているわけではなかった。「血は薄いが、体の作りが違う。見て分かる」

「魔法師が体格を分析するのか？」

「風は見えないものを感じる。体格も、力の流れも、同じだ」レイは続けた。「君の魔法は遅い。基礎がまだ固まっていない。でも動き方が良い——戦士の動きだ。魔法師の動きではない」

「それが問題か？」

「いや」レイは首を振った。「組み合わせによっては、強みになる。魔法師の動きは予測できる。戦士の動きは——予測しにくい」

林磊はこの少年を見た。真剣だった。「何が目的だ？」

「一緒に訓練したい。私は魔法は速い。でも体術は弱い。お互いに足りないものを持っている」

ドゥーリン老師は、この提案を聞いたとき一言だけ言った。「受けなさい」`,

  "8-5": `指輪の石が光ったのは深夜だった。

林磊は起き上がり、意識を指輪に向けた。老師は滅多に夜中に話しかけてこない——重要なことがある時だけだ。

「外に出なさい」老師は言った。「森の方向に、何かがいる」

「魔獣か？」

「分からない。しかし普通ではない。感じてみなさい」

林磊は服を着て窓から外に出た。夜の空気は冷たかった。森の方向に意識を向けると——老師の言う通り、何かがあった。魔獣の霊力でも、人の霊力でもない。もっと根本的な何か——大地そのものが呼吸しているような感覚。

「霊脈か？」林磊は低い声で言った。

「そう思う」老師は答えた。「ただし——活性化しつつある霊脈だ。普段は眠っている。今夜、何かが刺激した」

「何が？」

「君だ」

林磊は足を止めた。「私が？」

「龍血戦士の血が、霊脈に反応している。そういう記録が古い文献にある。おそらく——その霊脈の眠りを覚ましたのは、君がこの学院に来たからだ」

林磊は森を見た。暗かった。しかし何かが光りを持って待っているような気がした。「行って確認すべきか？」

「もちろん」老師は言った。「それは君のものだ」`,

  "9-3": `蕭炎の祖父は、孫の変化に最初に気づいた人物だった。

老人の名は蕭戦といった。蕭家の家長で、修行の道から退いた今も鋭い観察眼を保っていた。孫が三日前から何かが違う——話し方が落ち着いた。動きに無駄がなくなった。以前は隠せなかった焦りが、消えた。

「何があった？」夕食後、二人きりになったとき、蕭戦は直接聞いた。

「師匠ができました」蕭炎は答えた。

「師匠？どこの？」

「今は言えません」

蕭戦は孫の目を見た。嘘ではなかった。隠しているが、それには理由がある——そういう目だった。老人は追及しなかった。「強くなるか？」と代わりに聞いた。

「必ず」蕭炎は静かに、しかし確信を持って答えた。

蕭戦は息を吐いた。三年間、この子が霊力を失ったまま衰えていくのを見てきた。何度も声をかけたが、心に届いていなかった。今は——届いている。何かが変わった。何が変えたかは分からなくても、変わったことは確かだ。

「困ったことがあれば言え」老人は言った。「それだけだ」`,

  "9-4": `最初の錬丹は失敗した。

薬草を砕く力加減が強すぎた。熱の制御が一秒遅れた。成分が分離して、丹炉の中で小さな爆発が起きた。蕭炎は顔に煤をつけながら丹炉の前に座っていた。

「また」と薬老師匠の声が聞こえた。

「はい」蕭炎は答えた。

「どこが間違いだったか分かるか？」

「熱です。最後の段階で高くしすぎました」

「それだけか？」

蕭炎は考えた。炎の記憶を巻き戻すように。「砕き方も問題でした。細かすぎて、成分が変性した」

「良い」師匠は言った。「失敗から何を学ぶかが、錬丹師の実力を決める。もう一度やれ」

蕭炎は新しい薬草を用意した。前回の失敗を頭の中で整理しながら、手順を組み直した。今度は熱を低めに始め、砕き方を粗めに。丁寧に、急がずに。

三時間後、丹炉を開けると——完璧ではなかったが、形になったものが出てきた。

「合格ではない」師匠は言った。「しかし次は合格できる」

蕭炎は黒いかたまりを手のひらに載せた。失敗した丹薬だが、自分が作ったものだ。何かが胸の中で、小さく燃えるものを感じた。`,

  "9-5": `蕭薫兒が蕭炎の変化に気づいたのは、五ヶ月目のことだった。

彼女は幼い頃から蕭炎を知っていた——天才と呼ばれ、霊力を失い、落ちぶれた少年を。蕭家の中で彼に優しくしていたのは彼女だけだったかもしれない。しかしそれも、哀れみから来るものだったと正直に言えば——そうかもしれなかった。

今は違う。

訓練場の端で、蕭炎が基礎動作を繰り返しているのを見た。地味な動作だった。しかし繰り返すたびに——僅かに、確実に、精度が上がっていた。それを一時間続けた。休憩なしに。焦りなしに。

「蕭炎」彼女は声をかけた。

彼は振り返った。以前と目が違う——何年も先を見ているような、落ち着いた目だ。

「何してるの？」

「修行です」

「何の修行？霊力なしで？」

「霊力なしでできる修行は、霊力があるときより難しい」蕭炎は答えた。「だから基礎を固めるのに適している」

蕭薫兒は少し間を置いた。「いつから、そんなふうに考えるようになったの？」

「しばらく前から」彼は微笑んだ。前世より若い顔で、前世より成熟した笑いだった。「一緒に訓練しますか？教えられることがあるかもしれない」`,

  "10-2": `闘羅大陸の朝は、唐三が知っていた朝と少しだけ違った。

空気の質が違う——修行の気が濃い。彼が前世で過ごした崖の上の洞窟より、ここの方が自然霊力が豊富だった。それだけでなく、大地そのものが修行者の存在を前提として作られているような感覚があった。

彼は寝台から起き上がり、窓を開けた。外は霧だった。山の中腹にある小さな村——ここが今の彼の出発点だ。

唐三は手を見た。七歳の小さな手だ。前世では、この手で数百の技を扱い、天下無敵と言われた双刃を持ち、最後には自らの命と引き換えに技術を守った。

今はただの子供の手だ。

「もう一度、最初から」彼は静かに言った。言い訳も、焦りも、誇りも、なしに。ただ、積み上げ直す。

彼は床に座り、目を閉じた。魂の目覚めは三年後だ。それまでの時間を、何に使うか——前世でしなかった準備をすることだ。体幹の強化、柔軟性の訓練、平衡感覚の徹底的な鍛錬。修行の力がなくても、体は鍛えられる。そして体が整っていれば——魂が覚醒したとき、違う始まり方ができる。`,

  "10-3": `魂の覚醒式は十歳の誕生日に行われた。

村の長老が司式者を務め、近隣の村からも数人の修行者が立ち会いに来た。唐三の父親の顔を知る者がいなかったが、母の記憶を持つ者は何人かいた——美しく、強く、若くして亡くなった女性だったと、誰もが静かな声で言った。

唐三は覚醒石の前に立った。

何が出るか、彼は知っていた。前世と同じ魂が覚醒するなら——青銀草だ。最弱と呼ばれる攻撃系魂だ。会場の期待は、最初から低かった。

光が出た。

青かった。草の形だった。

集まった人々の表情から、落胆が消えた——正確には、表情が消えた。失礼のない、しかし明らかな失望の沈黙だ。

唐三は青銀草を見た。前世でこれが最終的にどうなったかを、彼は知っていた。誰もがこの魂を弱いと言った。しかし使い方次第で、それは覆せる。

「問題ない」と彼は声に出さずに思った。「問題にならないようにする」`,

  "10-4": `修行道場への入門試験の前日、唐三は川岸で一人、体術の練習をしていた。

道場の試験は魂の力だけを見るわけではなかった——体術、反応速度、判断力も評価される。唐三は三年かけて体を作り直した。前世の記憶が示す「最適な基礎」を、子供の体で一から積み上げた。

水面に石を跳ばした。五回跳んで沈んだ。

後ろから足音がした。振り返ると、同じ年頃の少年が立っていた。体格がよく、自信に満ちた目をしていた。「試験を受けるのか？」

「明日」唐三は答えた。

「俺も」少年は石を拾い、水面に投げた。七回跳んだ。「俺の名はマタイ。道場では有名な一家の出だ。試験で会うな」

唐三は次の石を手に取った。「唐三という。どこの出でもない」

少年は少し笑った。馬鹿にしているのか、親しみを示しているのか、分からない笑いだった。「どこの出でもないのに、なぜ道場を目指す？」

「強くなりたいから」

それは最も単純な答えだった。しかし言いながら、唐三はそれが正確ではないと気づいた。強くなりたいのではない——今度こそ、守れるほど強くなりたいのだ。`,

  "10-5": `道場の試験は午前中に終わった。

唐三は合格した。体術の点数が予想より高く、魂の力の弱さを補った。審査員の一人は試験後に「青銀草で合格するのは十年ぶりだ」と言った。

マタイも合格した。総合点は唐三より高かった。

道場への帰り道、二人は並んで歩いた。最初は無言だったが、マタイが口を開いた。「お前の体術、どこで習った？」

「独学です」

「信じられない」

「本当です」

マタイは唐三を横目で見た。「なぜそこまで基礎をやる？魂の修行が本体のはずだろう」

「魂の力は、体という入れ物に左右されます」唐三は答えた。「入れ物が弱ければ、どれだけ良い魂があっても使いきれない」

しばらく沈黙があった。「それを自分で考えたのか？」

「昔、誰かに教わった」

誰かというのは——前世の自分自身だ。しかしそれは言わなかった。マタイは「良い師匠だ」と言った。唐三はうなずいた。「そうです」`,

  "11-2": `修行の才とは何か、を弈云は転生して初めて本当の意味で考えた。

前世では答えは明確だった——才とは霊根の質と量だ。良い霊根を持って生まれた者は速く成長し、貧しい霊根の者は遅い。それは覆しがたい事実として、修行界全体が受け入れていた。

しかし今生の弈云の体は、前世より霊根の質が低かった。

前世で手に入れた技術と経験は、全てある。しかしそれを扱う器が劣っている。だとすれば——経験は才の差を超えられるのか？

答えを出すために、彼は実験を始めた。

修行を数値で記録した。同じ技法を使って、今の体での成長速度と、前世の同じ年齢での成長速度を比較した。記憶の中の数値と、今日実際に測れる数値を並べた。

一週間後、最初の結論が出た。

速度は確かに遅い。しかし方向性が違う——前世では気づかなかった微細な修正を、今は意図的に行えた。粗く速く進んでいた前世より、緻密に遅く進む今の方が、基礎の密度が高かった。`,

  "11-3": `三ヶ月後、弈云は道場の測定試験を受けた。

数値は平均以下だった。同学年の中で、下から三番目の結果だ。道場の師範は「努力が必要」と書面に記した。

弈云はその書面を受け取り、丁寧に折りたたんだ。

「弈云」師範が声をかけた。「がっかりしたか？」

「いいえ」

「数値は低い。才能の問題だ。努力でどこまでカバーできるかは——正直に言えば、分からない」

「そうですね」弈云は穏やかに答えた。師範の言葉は悪意のない事実の陳述だった。「ただ、一つ聞いていいですか？」

「何だ？」

「この数値が三ヶ月後に倍になったら、どう評価しますか？」

師範は少し考えた。「倍には簡単にならない。才能の壁がある」

「もしなったとしたら？」

「……才能の定義を見直す必要があるな」

弈云は頭を下げた。「三ヶ月後にまたお願いします」師範はその背中を見ながら、何かを思った——あの目は、できると信じている目ではなく、すでに知っている目だ。`,

  "11-4": `林新通という少女が話しかけてきたのは、弈云が道場に来て四ヶ月目だった。

彼女は学年で最も才能が高いと言われていた——霊根の質が突出していて、同世代との比較では頭一つ抜けていた。なぜ彼のような平均以下の学生に近づいてくるのか、最初は不思議だった。

「あなたの修行を見ていた」彼女は言った。率直な言い方だった。「一ヶ月前と今とで、動きが変わった。速くはなっていないけど——精度が上がった」

「見えましたか」弈云は少し驚いた。彼女の観察眼は前世の記憶にある通りだった。

「何をしているの？」

「基礎を緻密にしています。速さより、密度を優先して」

「それで強くなるの？」

弈云は彼女を見た。この問いに正直に答えることが、長い目で見て正しいと判断した。「強くなる速度は遅い。しかし到達できる高さが変わると思っています」

林新通は少し沈黙してから言った。「私と一緒に修行しない？私は速いけど、密度が薄い。あなたとは逆だと思う」

弈云は少し考えた。「試してみましょう」`,

  "11-5": `半年が経過して、弈云の測定値は前回の二倍を超えた。

師範は測定を三回繰り返した。機器を変えて、もう一度測った。結果は変わらなかった。書類に書かれた前回の数値と、今日の数値を並べ、師範は長い間何も言わなかった。

「どうやった？」彼はついに言った。

「緻密にしました」弈云は答えた。「量を増やすのではなく、今ある量の密度を上げました」

「そんな修行法は標準にない」

「標準にないだけで、不可能ではなかったということです」

林新通も同じ日に測定を受けていた。彼女の数値は前回より三割上昇していた——速度は変わっていないが、密度が増していた。

師範は二人の数値を見比べた。「二人で何をした？」

「お互いの欠点を補いました」弈云は答えた。「私は密度を、彼女は速度を持っていた。交換したわけではありませんが——互いのやり方を見ることで、自分のものが変わりました」

師範は書類を閉じた。「標準的な修行論では説明できないな」

「これが、新しい基礎になるかもしれません」弈云は静かに言った。`,

  "12-2": `北嶺学院は牧塵の記憶よりずっと小さかった。

前世——あるいは正確には、追放される前——の彼は中央大陸の最上位学院に籍を置いていた。比較すれば北嶺学院は地方の小規模な施設に過ぎない。しかしそれは同時に、注目されにくいということでもあった。

「まず、状況を整理する」牧塵は寮の部屋で一人、考えた。

彼の霊力は現在「霊動境」の初期段階だ。前世で最終的に到達した境地から考えれば、はるか遥か手前にある。しかし今生では最初から高い地点に立つ必要はない——正しい方向に、確実に進めばいい。

霊力の路線図が頭の中にあった。前世で歩いた道のりの記憶だ。失敗した箇所、間違えた選択、遠回りになった決断——全部覚えている。今度はその失敗を避けながら進める。

「ただし」と彼は思った。「同じ道は歩かない」

前世と同じ選択をすれば、前世と同じ結果になる可能性が高い。今生では、意図的に違う道を選ぶ必要がある場面がある。それがどこかを、冷静に判断しながら進む。`,

  "12-3": `新入生の交流戦が第二週に行われた。

形式は単純だった——希望者同士が模擬戦を行い、上位の成績者が学院の注目を集める。参加は任意だったが、ほぼ全員が参加した。入学直後に実力を示すことが、この後の学院生活に影響するからだ。

牧塵は参加した。目立つためではなく、現在の自分の体の能力を正確に測るために。

三試合行った。一勝二敗だった。

一敗目は力の差が明確だった——相手の実力が上だった。二敗目は自分のミスだった——前世の感覚で動いて、今の体の反応速度と合わなかった。

「まだ身体と頭が合っていない」牧塵は試合後に思った。前世の記憶は正確だが、今の体の限界を過大評価してしまう癖がある。それを修正するのに、もう数週間かかるだろう。

試合を見ていた羅璃が、後から声をかけてきた。「二敗目は分かっていて負けたでしょう」

牧塵は彼女を見た。「なぜそう思う？」

「二敗目だけ、試合中に考えている顔をしていた。勝とうとしていなかった」

「正解です」牧塵は答えた。「あの試合で何かを見つけようとしていた」

「何を？」

「自分の体の限界」`,

  "12-4": `一ヶ月後、牧塵は霊動境の第三段階に達した。

標準的なペースより少し遅い。しかし彼には数値より大切にしていることがあった——段階が上がるたびに、前の段階の基礎が完全に固まってから次に進む。急いで上昇して後から基礎の穴が出るより、遅くても穴のない進み方の方が長期的には速い。

それを理解している人間が学院の中にほとんどいないことを、牧塵は少し奇妙に思った。みな目先の数値を追っていた。

羅璃は例外だった。

彼女の修行方針は牧塵と似ていた——数値より質を優先する。才能は疑いなく高かったが、急がなかった。なぜそういう方針なのかを、牧塵は一度聞いたことがある。

「師匠に言われた」と彼女は答えた。「良い建物は基礎から作る、と」

「良い師匠ですね」

「あなたには師匠がいないの？」

「今はいません」牧塵は答えた。「でも——昔、誰かに教わった気がする」

前世の記憶は、師匠の顔まで思い出せなかった。しかしその言葉は残っていた。`,

  "12-5": `新入生大会は三ヶ月後に開催される——それが学院の恒例行事だった。

学年末の大会と違い、新入生大会は実力ではなく「成長」を見るものだ。入学時から現在までの変化量が評価される。そのため、最初から高い者より、低い出発点から大きく伸びた者が注目される。

牧塵の入学時の測定値は平均を下回っていた。

そして現在の値は、平均を大きく超えていた。

数値だけを見れば、大会で注目される立場になっていた。それは意図していなかったが、避けられない結果でもあった。

「どうするの？」羅璃が聞いた。大会の参加申請締め切りの前日だった。

「参加します」牧塵は答えた。

「目立つことになる」

「分かっています」

「前世——いや、何か特別な経験があるの？」彼女は慎重に言った。「時々、あなたは経験したことのない何かを知っているように見える」

牧塵は彼女を見た。この観察眼は前世でも知っていた。「あなたは鋭い」

「答えにならない」

「答えられる時に答えます」彼は静かに言った。「今は——一緒に大会を戦いましょう。それだけで十分だ」`,

};

// Get chapter content - use pre-written if available, else generate via API
function getChapterContent(novelId, chapterNum, novelTitle, novelAuthor, novelGenre, novelDesc, callback) {
  const key = novelId + '-' + chapterNum;
  if (CHAPTER_CONTENT[key]) {
    // Use pre-written content
    setTimeout(() => callback(CHAPTER_CONTENT[key]), 300);
    return;
  }
  // Try API (may not work on GitHub Pages due to CORS/API key)
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: 'You are a skilled xianxia/wuxia novel author. Write one compelling chapter in English with flowing, dramatic prose. Write exactly 4-5 substantial paragraphs. Do NOT include any chapter number or title heading — start directly with the story.',
      messages: [{ role: 'user', content: 'Write Chapter ' + chapterNum + ' of "' + novelTitle + '" by ' + novelAuthor + '. Genre: ' + novelGenre + '. Synopsis: ' + novelDesc }]
    })
  })
  .then(r => r.json())
  .then(data => {
    const text = (data.content || []).map(b => b.text || '').join('\n\n');
    callback(text || fallbackContent(novelTitle, chapterNum));
  })
  .catch(() => callback(fallbackContent(novelTitle, chapterNum)));
}

function fallbackContent(title, ch) {
  return `The world of cultivation is vast and unforgiving. In Chapter ${ch} of ${title}, our hero faces trials that would break ordinary men — yet within every challenge lies the seed of greater power. The path to immortality is paved not with comfort, but with perseverance forged in the fires of adversity.\n\nAcross the spiritual realm, ancient techniques clash with modern ambition. Those who cultivate in isolation may grow strong, but those who forge bonds of steel with comrades and mentors discover strengths they never imagined. The young cultivator pressed forward, meridians burning, will unbroken.\n\nHeavens tremble when a true genius rises. The elders who dismissed him as talentless now watched with narrowed eyes as his spiritual energy manifested in ways their textbooks had never recorded. Something ancient was awakening within him — something that had slept for ten thousand years, waiting for exactly this vessel, this moment, this resolve.\n\nThe path ahead was long. The enemies were many. But for the first time since beginning this journey, he smiled — not with bravado, but with the quiet certainty of someone who has finally glimpsed what they are capable of becoming.`;
}

let sliderTimer = null;
const BANNER_IDS = [1,8,3,5,7];
const TOTAL_CHAPTERS_PREVIEW = 20;

// ── COVER RENDERING ──
function coverToImg(novelId) {
  const svgDataUri = makeCover(novelId);
  return svgDataUri;
}

// ── LIBRARY ──
function saveLibrary() {
  localStorage.setItem('xw_library', JSON.stringify(library));
  const count = library.length;
  const badge = document.getElementById('lib-count');
  if(count > 0){ badge.textContent = count; badge.style.display='flex'; }
  else badge.style.display='none';
  const titleEl = document.getElementById('lib-page-title');
  if(titleEl) titleEl.textContent = 'マイライブラリ (' + count + ')';
}

function toggleLibrary() {
  if(!currentNovel) return;
  const id = currentNovel.id;
  const idx = library.indexOf(id);
  if(idx > -1) library.splice(idx,1);
  else library.push(id);
  saveLibrary();
  updateHeartBtn();
}

function updateHeartBtn() {
  const btn = document.getElementById('detail-heart-btn');
  if(!btn || !currentNovel) return;
  const inLib = library.includes(currentNovel.id);
  btn.textContent = inLib ? '❤️' : '🤍';
  btn.className = 'btn-heart' + (inLib ? ' active' : '');
}

// ── PAGE NAVIGATION ──
function goPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + pageId);
  if(target) { target.classList.add('active'); target.scrollTop = 0; }
  // update bottom nav
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById('nav-' + pageId);
  if(navBtn) navBtn.classList.add('active');
  // special page setup
  if(pageId === 'library') renderLibraryPage();
  if(pageId === 'search') {
    setTimeout(() => document.getElementById('search-input')?.focus(), 100);
    document.getElementById('search-results').innerHTML = '';
    document.getElementById('search-input').value = '';
    document.getElementById('search-chips').style.display = 'block';
  }
  window.scrollTo(0,0);
}

// ── OPEN NOVEL DETAIL ──
function openNovel(novelId) {
  currentNovel = NOVELS.find(n => n.id === novelId);
  if(!currentNovel) return;
  const n = currentNovel;
  const coverSrc = coverToImg(n.id);

  document.getElementById('detail-hero-bg').src = coverSrc;
  document.getElementById('detail-cover-img').src = coverSrc;
  document.getElementById('detail-cover-img').alt = n.title;
  document.getElementById('detail-title').textContent = n.titleID;
  document.getElementById('detail-orig').textContent = n.title;
  document.getElementById('detail-chapters').textContent = '📖 ' + n.chapters.toLocaleString();
  document.getElementById('detail-views').textContent = '👁️ ' + n.views;
  document.getElementById('detail-rating').textContent = '⭐ ' + (Math.floor(n.rating/10)/1).toFixed(1) + '/10';
  document.getElementById('detail-desc').textContent = n.desc;

  // badges
  const badgesEl = document.getElementById('detail-badges');
  badgesEl.innerHTML = `
    <span class="${n.status==='完結'?'badge-status-done':'badge-status-ongoing'}">${n.status}</span>
    <span class="badge-rating">👍 ${n.rating}%</span>
  `;

  // tags
  document.getElementById('detail-tags').innerHTML = n.tags.map(t => `<span class="tag">${t}</span>`).join('');

  // chapter list
  const clEl = document.getElementById('chapter-list');
  let chHtml = '';
  const maxCh = Math.min(TOTAL_CHAPTERS_PREVIEW, n.chapters);
  for(let i=1; i<=maxCh; i++) {
    chHtml += `<div class="chapter-item" onclick="readChapter(${i})">
      <div class="ch-left"><span class="ch-num">第${i}話</span><span class="ch-title">チャプター ${i}</span></div>
      <span class="ch-arrow">›</span>
    </div>`;
  }
  if(n.chapters > TOTAL_CHAPTERS_PREVIEW) {
    chHtml += `<div style="text-align:center;padding:14px;color:#555;font-size:13px">+ ${(n.chapters-TOTAL_CHAPTERS_PREVIEW).toLocaleString()} チャプターがあります</div>`;
  }
  clEl.innerHTML = chHtml;

  updateHeartBtn();
  switchTab('about');
  goPage('detail');
}

// ── TAB SWITCHING ──
function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`).classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
}

// ── START READING ──
function startReading() { readChapter(1); }
function readChapter(chNum) {
  currentChapter = chNum;
  loadChapter();
  goPage('reader');
}

// ── CHAPTER READER ──
function loadChapter() {
  if(!currentNovel) return;
  const n = currentNovel;
  document.getElementById('reader-novel-title').textContent = n.titleID;
  document.getElementById('reader-ch-label').textContent = '第' + currentChapter + '話';
  document.getElementById('reader-ch-title').textContent = '第' + currentChapter + '話';
  document.getElementById('nav-prev').disabled = currentChapter <= 1;
  document.getElementById('nav-next').disabled = currentChapter >= Math.min(TOTAL_CHAPTERS_PREVIEW, n.chapters);

  const content = document.getElementById('reader-content');
  content.innerHTML = `<div class="loading-spinner"><div class="spinner">⟳</div><div class="spinner-text">チャプターを読み込み中...</div></div>`;

  getChapterContent(n.id, currentChapter, n.title, n.author, n.genre, n.desc, function(text) {
    const paras = text.split('\n\n').filter(function(p){ return p.trim(); });
    content.innerHTML = paras.map(function(p){
      return '<p class="reader-para" style="font-size:' + readerFontSize + 'px">' + p.trim() + '</p>';
    }).join('');
    document.getElementById('reader-body').scrollTop = 0;
  });
}

function prevChapter() {
  if(currentChapter > 1) { currentChapter--; loadChapter(); document.getElementById('reader-body').scrollTop=0; }
}
function nextChapter() {
  const max = Math.min(TOTAL_CHAPTERS_PREVIEW, currentNovel?.chapters || 1);
  if(currentChapter < max) { currentChapter++; loadChapter(); document.getElementById('reader-body').scrollTop=0; }
}
function changeFontSize(delta) {
  readerFontSize = Math.max(13, Math.min(22, readerFontSize + delta));
  document.querySelectorAll('.reader-para').forEach(p => p.style.fontSize = readerFontSize + 'px');
}

// ── SEARCH ──
let searchTimer = null;
function doSearch(q) {
  clearTimeout(searchTimer);
  const resultsEl = document.getElementById('search-results');
  const chipsEl = document.getElementById('search-chips');
  const aiTip = document.getElementById('search-ai-tip');
  if(!q.trim()) {
    resultsEl.innerHTML = ''; chipsEl.style.display='block'; aiTip.style.display='none'; return;
  }
  chipsEl.style.display = 'none';
  const ql = q.toLowerCase();
  const found = NOVELS.filter(n =>
    n.titleID.toLowerCase().includes(ql) || n.title.toLowerCase().includes(ql) ||
    n.genre.toLowerCase().includes(ql) || n.tags.some(t => t.toLowerCase().includes(ql))
  );
  if(found.length === 0) {
    resultsEl.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#555">「${q}」の検索結果はありません</div>`;
  } else {
    resultsEl.innerHTML = found.map(n => `
      <div class="search-result" onclick="openNovel(${n.id})">
        <div class="search-result-cover"><img src="${coverToImg(n.id)}" alt="${n.title}"></div>
        <div>
          <div class="search-title">${n.titleID}</div>
          <div class="search-meta">${n.title} · ${n.genre} · ⭐${n.rating}%</div>
          <div class="search-desc">${n.desc}</div>
        </div>
      </div>`).join('');
  }
  // AI tip
  searchTimer = setTimeout(() => {
    fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:120,
        system:'You are an assistant for a Japanese xianxia novel platform. Reply in Japanese in 1-2 sentences with a helpful recommendation based on the search.',
        messages:[{role:'user', content:'検索クエリ: "' + q + '"'}]
      })
    }).then(r=>r.json()).then(d => {
      const t = (d.content||[]).map(b=>b.text||'').join('');
      if(t) { aiTip.style.display='flex'; document.getElementById('search-ai-text').textContent=t; }
    }).catch(()=>{});
  }, 800);
}
function setSearch(val) {
  document.getElementById('search-input').value = val;
  doSearch(val);
}

// ── LIBRARY PAGE ──
function renderLibraryPage() {
  const listEl = document.getElementById('library-list');
  const titleEl = document.getElementById('lib-page-title');
  if(titleEl) titleEl.textContent = 'マイライブラリ (' + library.length + ')';
  if(library.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><div>ライブラリが空です</div><div style="font-size:12px;margin-top:6px;color:#444">お気に入りの小説を追加しよう</div></div>`;
    return;
  }
  listEl.innerHTML = library.map(id => {
    const n = NOVELS.find(x=>x.id===id);
    if(!n) return '';
    return `<div class="lib-item">
      <div class="lib-cover" onclick="openNovel(${n.id})"><img src="${coverToImg(n.id)}" alt="${n.title}"></div>
      <div class="lib-info" onclick="openNovel(${n.id})">
        <div class="lib-title">${n.titleID}</div>
        <div class="lib-author">${n.author}</div>
        <span class="${n.status==='完結'?'badge-status-done':'badge-status-ongoing'}">${n.status}</span>
      </div>
      <button class="lib-remove" onclick="removeFromLib(${n.id})">✕</button>
    </div>`;
  }).join('');
}
function removeFromLib(id) {
  library = library.filter(x=>x!==id);
  saveLibrary();
  renderLibraryPage();
}

// ── HERO SLIDER ──
function buildSlider() {
  const container = document.getElementById('slider-container');
  const dotsEl = document.getElementById('slider-dots');
  container.innerHTML = '';
  dotsEl.innerHTML = '';
  BANNER_IDS.forEach((nid, i) => {
    const n = NOVELS.find(x=>x.id===nid);
    if(!n) return;
    const coverSrc = coverToImg(n.id);
    const div = document.createElement('div');
    div.className = 'slide' + (i===0?' active':'');
    div.id = 'slide-' + i;
    div.innerHTML = `
      <img src="${coverSrc}" alt="${n.title}" class="slide-bg" style="filter:blur(14px) brightness(.35) saturate(1.3);transform:scale(1.15)">
      <div class="slide-gradient" style="background:${n.bannerBg};opacity:.6"></div>
      <div class="slide-cover"><img src="${coverSrc}" alt="${n.title}"></div>
      <div class="slide-content">
        <div class="slide-badges">
          <span class="badge-rating">👍 ${n.rating}%</span>
          <span class="${n.status==='完結'?'badge-status-done':'badge-status-ongoing'}">${n.status}</span>
        </div>
        <div class="slide-title">${n.titleID}</div>
        <div class="slide-desc">${n.desc}</div>
        <button class="btn-read-now" onclick="openNovel(${n.id})">今すぐ読む</button>
      </div>`;
    container.appendChild(div);
    const dot = document.createElement('button');
    dot.className = 'dot' + (i===0?' active':'');
    dot.onclick = () => goSlide(i);
    dotsEl.appendChild(dot);
  });
  startSliderTimer();
}

function goSlide(idx) {
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
  const slide = document.getElementById('slide-'+idx);
  if(slide) { slide.classList.add('active'); slide.style.animation='none'; slide.offsetHeight; slide.style.animation=''; }
  document.querySelectorAll('.dot')[idx]?.classList.add('active');
  sliderIdx = idx;
}
function slideNext() { goSlide((sliderIdx+1) % BANNER_IDS.length); resetSliderTimer(); }
function slidePrev() { goSlide((sliderIdx-1+BANNER_IDS.length) % BANNER_IDS.length); resetSliderTimer(); }
function startSliderTimer() { sliderTimer = setInterval(()=>goSlide((sliderIdx+1)%BANNER_IDS.length), 5000); }
function resetSliderTimer() { clearInterval(sliderTimer); startSliderTimer(); }

// ── NOVEL CARD HTML ──
function novelCardHTML(n, rank) {
  const badgeMap = {HOT:'badge-hot',TOP:'badge-top',NEW:'badge-new',CLASSIC:'badge-classic',PREMIUM:'badge-premium'};
  return `<div class="novel-card" onclick="openNovel(${n.id})">
    <div class="novel-cover-wrap">
      <img src="${coverToImg(n.id)}" alt="${n.title}" width="130" height="175" loading="lazy">
      <div class="novel-status-bar"><span class="${n.status==='完結'?'status-done':'status-ongoing'}">${n.status}</span></div>
      ${rank ? `<div class="novel-rank">${rank}</div>` : ''}
      <div class="novel-timer">⏱</div>
      ${n.badge ? `<div class="novel-badge ${badgeMap[n.badge]||'badge-hot'}">${n.badge}</div>` : ''}
    </div>
    <div class="novel-rating">👍 ${n.rating}%</div>
    <div class="novel-title">${n.titleID}</div>
  </div>`;
}

// ── ANNOUNCEMENTS ──
function buildAnnouncements() {
  const el = document.getElementById('announcements');
  const items = [
    {id:4, title:'リッチ・フォー・ハイヤー – 狡猾なリッチの権力への台頭！', time:'5日前'},
    {id:1, title:'Nine Star Hegemon Body Art – チャプター4800が公開されました！', time:'2日前'},
  ];
  el.innerHTML = items.map(a => {
    const n = NOVELS.find(x=>x.id===a.id);
    return `<div class="announce-item" onclick="openNovel(${a.id})">
      <div class="announce-thumb"><img src="${coverToImg(a.id)}" alt=""></div>
      <div><div class="announce-title">${a.title}</div><div class="announce-time">${a.time}</div></div>
      <span style="color:#555;font-size:16px">›</span>
    </div>`;
  }).join('');
}

// ── GENRE FILTER ──
function filterGenre(genre) {
  const filtered = genre === '完結' ? NOVELS.filter(n=>n.status==='完結') : NOVELS.filter(n=>n.genre===genre||n.tags.includes(genre));
  goPage('search');
  document.getElementById('search-input').value = genre;
  document.getElementById('search-chips').style.display = 'none';
  document.getElementById('search-results').innerHTML = filtered.map(n => `
    <div class="search-result" onclick="openNovel(${n.id})">
      <div class="search-result-cover"><img src="${coverToImg(n.id)}" alt="${n.title}"></div>
      <div>
        <div class="search-title">${n.titleID}</div>
        <div class="search-meta">${n.title} · ${n.genre}</div>
        <div class="search-desc">${n.desc}</div>
      </div>
    </div>`).join('');
}

// ── INIT ──
function init() {
  buildSlider();
  buildAnnouncements();
  // Popular (by views desc)
  const popular = [...NOVELS].sort((a,b)=>parseFloat(b.views)-parseFloat(a.views)).slice(0,8);
  document.getElementById('popular-scroll').innerHTML = popular.map((n,i)=>novelCardHTML(n,i+1)).join('');
  // New releases
  const newRel = NOVELS.slice(3,11);
  document.getElementById('new-scroll').innerHTML = newRel.map(n=>novelCardHTML(n,null)).join('');
  // Completed
  const completed = NOVELS.filter(n=>n.status==='完結');
  document.getElementById('completed-scroll').innerHTML = completed.map(n=>novelCardHTML(n,null)).join('');
  // Library badge
  saveLibrary();
}

document.addEventListener('DOMContentLoaded', init);
</script>
