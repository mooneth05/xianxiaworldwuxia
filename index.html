<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>仙侠ワールド</title>
<meta name="description" content="仙侠小説リーダー - 日本語対応の小説プラットフォーム">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:#111;color:#f0f0f0;font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
.page{display:none;min-height:100vh;padding-bottom:70px;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes slideLeft{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
.fade-in{animation:fadeIn .3s ease forwards;}
/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(17,17,17,.97);backdrop-filter:blur(12px);border-bottom:1px solid #1e1e1e;}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none;}
.logo-char{font-size:28px;line-height:1;color:#e8a020;}
.logo-text{font-size:10px;color:#666;}
.header-icons{display:flex;gap:16px;align-items:center;}
.icon-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:20px;position:relative;padding:4px;}
.badge{position:absolute;top:-4px;right:-4px;background:#e8a020;color:#000;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(17,17,17,.97);backdrop-filter:blur(12px);border-top:1px solid #1e1e1e;display:flex;padding:6px 0;}
.nav-btn{flex:1;background:none;border:none;cursor:pointer;padding:6px 0;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nav-icon{font-size:20px;}
.nav-label{font-size:10px;color:#666;font-family:'Noto Sans JP',sans-serif;}
.nav-btn.active .nav-label{color:#e8a020;font-weight:600;}
/* MAIN CONTENT */
.main-content{padding-top:60px;}
/* HERO SLIDER */
.slider-wrap{padding:12px 16px;position:relative;}
.slide{border-radius:12px;overflow:hidden;position:relative;aspect-ratio:16/9;min-height:180px;display:none;}
.slide.active{display:block;animation:fadeIn .4s ease;}
.slide-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.slide-gradient{position:absolute;inset:0;}
.slide-cover{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:90px;height:130px;border-radius:6px;overflow:hidden;box-shadow:-6px 0 20px rgba(0,0,0,.8);}
.slide-cover img{width:100%;height:100%;object-fit:cover;}
.slide-content{position:absolute;bottom:0;left:0;right:0;padding:14px 14px 12px;max-width:65%;}
.slide-badges{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.badge-rating{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);padding:2px 8px;border-radius:20px;font-size:11px;color:#fff;}
.badge-status-ongoing{background:rgba(30,150,80,.3);border:1px solid rgba(30,150,80,.5);padding:2px 8px;border-radius:20px;font-size:11px;color:#4ade80;}
.badge-status-done{background:rgba(96,165,250,.2);border:1px solid rgba(96,165,250,.4);padding:2px 8px;border-radius:20px;font-size:11px;color:#60a5fa;}
.slide-title{font-size:18px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.slide-desc{font-size:12px;color:rgba(255,255,255,.7);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;}
.btn-read-now{background:#e8a020;border:none;color:#000;padding:7px 18px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
/* SLIDER CONTROLS */
.slider-prev,.slider-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:5;}
.slider-prev{left:20px;}.slider-next{right:20px;}
.slider-dots{display:flex;justify-content:center;gap:6px;margin-top:8px;}
.dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.3);border:none;cursor:pointer;padding:0;transition:all .3s;}
.dot.active{width:18px;background:#e8a020;}
/* SECTION */
.section{margin-bottom:24px;}
.section-header{display:flex;justify-content:space-between;align-items:center;padding:0 16px;margin-bottom:10px;}
.section-title{font-size:18px;font-weight:700;color:#f0f0f0;}
.see-all{background:none;border:none;color:#999;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
/* HORIZONTAL SCROLL */
.h-scroll{display:flex;gap:12px;overflow-x:auto;padding:4px 16px 8px;scrollbar-width:none;}
.h-scroll::-webkit-scrollbar{display:none;}
/* NOVEL CARD */
.novel-card{flex:0 0 auto;width:130px;cursor:pointer;}
.novel-cover-wrap{position:relative;border-radius:8px;overflow:hidden;margin-bottom:7px;box-shadow:0 4px 12px rgba(0,0,0,.6);}
.novel-cover-wrap img{width:130px;height:175px;object-fit:cover;display:block;}
.novel-status-bar{position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,.65);padding:3px 6px;}
.novel-status-bar span{font-size:10px;font-weight:500;}
.status-ongoing{color:#4ade80;}.status-done{color:#60a5fa;}
.novel-rank{position:absolute;bottom:8px;left:8px;font-size:26px;font-weight:900;color:#fff;text-shadow:0 0 8px rgba(0,0,0,.9),1px 1px 0 #000;line-height:1;}
.novel-timer{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);border-radius:5px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;}
.novel-badge{position:absolute;top:22px;left:0;padding:2px 6px;font-size:9px;font-weight:700;color:#fff;border-radius:0 3px 3px 0;}
.badge-hot{background:#dc2626;}.badge-top{background:#7c3aed;}.badge-new{background:#059669;}.badge-classic{background:#7c3aed;}.badge-premium{background:#d97706;}
.novel-rating{font-size:11px;color:#aaa;margin-bottom:2px;}
.novel-title{font-size:12px;font-weight:600;color:#f0f0f0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
/* ANNOUNCEMENT */
.announce-item{display:flex;align-items:center;gap:12px;background:#1a1a1a;border-radius:10px;padding:12px 14px;margin:0 16px 8px;cursor:pointer;}
.announce-thumb{width:44px;height:44px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.announce-thumb img{width:100%;height:100%;object-fit:cover;}
.announce-title{font-size:13px;font-weight:500;color:#e0e0e0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.announce-time{font-size:11px;color:#666;margin-top:3px;}
/* GENRE GRID */
.genre-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;}
.genre-card{background:#1a1a1a;border-radius:10px;padding:14px 10px;cursor:pointer;text-align:center;}
.genre-icon{font-size:24px;margin-bottom:6px;}
.genre-name{font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:2px;}
.genre-count{font-size:11px;color:#666;}
/* NOVEL DETAIL */
.detail-hero{position:relative;width:100%;height:240px;overflow:hidden;}
.detail-hero-bg{width:100%;height:100%;object-fit:cover;filter:blur(10px) brightness(.4);transform:scale(1.1);}
.detail-back{position:absolute;top:16px;left:16px;background:rgba(0,0,0,.6);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;}
.detail-body{padding:0 16px;margin-top:-60px;position:relative;z-index:1;}
.detail-cover-row{display:flex;gap:14px;margin-bottom:16px;}
.detail-cover{width:100px;height:140px;border-radius:8px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.8);flex-shrink:0;}
.detail-cover img{width:100%;height:100%;object-fit:cover;}
.detail-info{flex:1;padding-top:55px;}
.detail-title{font-size:17px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:3px;text-shadow:0 1px 4px rgba(0,0,0,.8);}
.detail-orig{font-size:13px;color:#aaa;margin-bottom:8px;}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;}
.detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#2a2a2a;border-radius:10px;overflow:hidden;margin-bottom:16px;}
.stat-item{background:#1a1a1a;padding:12px 8px;text-align:center;}
.stat-val{font-size:14px;font-weight:700;color:#f0f0f0;}
.stat-lbl{font-size:10px;color:#666;margin-top:2px;}
.detail-cta{display:flex;gap:10px;margin-bottom:20px;}
.btn-read{flex:1;background:#e8a020;border:none;color:#000;padding:13px;border-radius:25px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.btn-heart{width:50px;background:#222;border:1px solid #333;color:#aaa;border-radius:25px;font-size:18px;cursor:pointer;}
.btn-heart.active{background:rgba(232,160,32,.15);border-color:#e8a020;color:#e8a020;}
.detail-tabs{display:flex;border-bottom:1px solid #2a2a2a;margin-bottom:16px;}
.tab-btn{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:#666;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;}
.tab-btn.active{border-bottom-color:#e8a020;color:#e8a020;}
.tab-content{display:none;animation:fadeIn .2s ease;}
.tab-content.active{display:block;}
.synopsis{font-size:14px;color:#ccc;line-height:1.8;margin-bottom:14px;}
.tag-list{display:flex;gap:8px;flex-wrap:wrap;}
.tag{background:#222;border:1px solid #333;color:#aaa;padding:4px 12px;border-radius:20px;font-size:12px;}
.chapter-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:#1a1a1a;border-radius:8px;margin-bottom:6px;cursor:pointer;}
.ch-left{display:flex;align-items:center;gap:10px;}
.ch-num{font-size:12px;color:#888;min-width:40px;}
.ch-title{font-size:14px;color:#e0e0e0;}
.ch-arrow{color:#555;font-size:16px;}
/* CHAPTER READER */
.reader-header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,13,13,.97);border-bottom:1px solid #2a2a2a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(8px);}
.reader-back{background:none;border:none;color:#fff;cursor:pointer;font-size:22px;padding:0;}
.reader-title-wrap{text-align:center;}
.reader-novel{font-size:13px;font-weight:600;color:#e0e0e0;}
.reader-ch{font-size:11px;color:#666;}
.font-controls{display:flex;gap:6px;}
.font-btn{background:#222;border:none;color:#aaa;width:30px;height:30px;border-radius:6px;cursor:pointer;}
.reader-body{max-width:680px;margin:0 auto;padding:80px 20px 80px;}
.reader-ch-title{font-size:18px;font-weight:700;color:#e8a020;text-align:center;margin-bottom:28px;}
.reader-para{line-height:1.95;color:#ccc;margin-bottom:1.6em;font-family:'Noto Serif JP',serif;text-indent:2em;}
.reader-nav{display:flex;gap:12px;margin-top:32px;}
.nav-prev,.nav-next{flex:1;padding:12px;border-radius:10px;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;border:1px solid #333;}
.nav-prev{background:#222;color:#aaa;}
.nav-next{background:#e8a020;border-color:#e8a020;color:#000;font-weight:600;}
.nav-prev:disabled,.nav-next:disabled{opacity:.3;cursor:default;}
/* SEARCH */
.search-header{position:fixed;top:0;left:0;right:0;z-index:100;background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:12px 16px;display:flex;gap:10px;align-items:center;}
.search-input-wrap{flex:1;display:flex;align-items:center;background:#222;border-radius:20px;padding:8px 14px;gap:8px;}
.search-input{flex:1;background:none;border:none;color:#e0e0e0;font-size:14px;outline:none;font-family:'Noto Sans JP',sans-serif;}
.search-result{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #1e1e1e;cursor:pointer;}
.search-result-cover{width:50px;height:70px;border-radius:6px;overflow:hidden;flex-shrink:0;}
.search-result-cover img{width:100%;height:100%;object-fit:cover;}
.search-title{font-size:14px;font-weight:600;color:#e0e0e0;margin-bottom:2px;}
.search-meta{font-size:12px;color:#777;margin-bottom:4px;}
.search-desc{font-size:12px;color:#555;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.chip-btn{display:inline-block;background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:7px 14px;border-radius:20px;font-size:13px;margin:0 8px 8px 0;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
/* LIBRARY */
.lib-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #1e1e1e;}
.lib-cover{width:60px;height:84px;border-radius:6px;overflow:hidden;flex-shrink:0;cursor:pointer;}
.lib-cover img{width:100%;height:100%;object-fit:cover;}
.lib-info{flex:1;cursor:pointer;}
.lib-title{font-size:14px;font-weight:600;color:#e0e0e0;margin-bottom:2px;}
.lib-author{font-size:12px;color:#777;margin-bottom:6px;}
.lib-remove{background:none;border:none;color:#555;cursor:pointer;font-size:18px;align-self:center;}
/* LOADING */
.loading-spinner{text-align:center;padding:48px;color:#666;}
.spinner{font-size:28px;animation:spin 1s linear infinite;display:inline-block;margin-bottom:10px;}
.spinner-text{font-size:13px;animation:pulse 1.5s ease-in-out infinite;}
/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:#555;}
.empty-icon{font-size:40px;margin-bottom:12px;}
/* PAGE TITLE BAR */
.page-title-bar{padding:14px 16px;display:flex;align-items:center;gap:12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;}
.page-title-back{background:none;border:none;color:#fff;cursor:pointer;font-size:22px;}
.page-title-text{font-size:17px;font-weight:700;}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <a class="logo" onclick="goPage('home')">
      <span class="logo-char">弌</span>
      <span class="logo-text">仙侠ワールド</span>
    </a>
    <div class="header-icons">
      <button class="icon-btn" onclick="goPage('search')" title="検索">🔍</button>
      <button class="icon-btn" id="lib-btn" onclick="goPage('library')" title="ライブラリ">📚<span class="badge" id="lib-count" style="display:none">0</span></button>
    </div>
  </div>
</header>

<!-- HOME PAGE -->
<div class="page active main-content" id="page-home">

  <!-- HERO SLIDER -->
  <div class="slider-wrap">
    <div id="slider-container">
      <!-- Slides injected by JS -->
    </div>
    <button class="slider-prev" onclick="slidePrev()">‹</button>
    <button class="slider-next" onclick="slideNext()">›</button>
    <div class="slider-dots" id="slider-dots"></div>
  </div>

  <!-- ANNOUNCEMENT -->
  <section class="section">
    <div class="section-header">
      <span class="section-title">お知らせ</span>
      <button class="see-all">すべて見る ›</button>
    </div>
    <div id="announcements"></div>
  </section>

  <!-- POPULAR -->
  <section class="section">
    <div class="section-header">
      <span class="section-title">今週の人気作</span>
      <button class="see-all">すべて見る ›</button>
    </div>
    <div class="h-scroll" id="popular-scroll"></div>
  </section>

  <!-- NEW RELEASES -->
  <section class="section">
    <div class="section-header">
      <span class="section-title">新着作品</span>
      <button class="see-all">すべて見る ›</button>
    </div>
    <div class="h-scroll" id="new-scroll"></div>
  </section>

  <!-- COMPLETED -->
  <section class="section">
    <div class="section-header">
      <span class="section-title">完結済み</span>
      <button class="see-all">すべて見る ›</button>
    </div>
    <div class="h-scroll" id="completed-scroll"></div>
  </section>

  <!-- GENRES -->
  <section class="section">
    <div class="section-header">
      <span class="section-title">ジャンルを探す</span>
    </div>
    <div class="genre-grid">
      <div class="genre-card" onclick="filterGenre('仙侠')"><div class="genre-icon">⚡</div><div class="genre-name">仙侠</div><div class="genre-count">3,241 作品</div></div>
      <div class="genre-card" onclick="filterGenre('武侠')"><div class="genre-icon">🗡️</div><div class="genre-name">武侠</div><div class="genre-count">2,108 作品</div></div>
      <div class="genre-card" onclick="filterGenre('ファンタジー')"><div class="genre-icon">🔮</div><div class="genre-name">ファンタジー</div><div class="genre-count">4,620 作品</div></div>
      <div class="genre-card" onclick="filterGenre('システム')"><div class="genre-icon">🤖</div><div class="genre-name">システム</div><div class="genre-count">1,854 作品</div></div>
      <div class="genre-card" onclick="filterGenre('ロマンス')"><div class="genre-icon">💕</div><div class="genre-name">ロマンス</div><div class="genre-count">2,990 作品</div></div>
      <div class="genre-card" onclick="filterGenre('完結')"><div class="genre-icon">✅</div><div class="genre-name">完結済み</div><div class="genre-count">5,102 作品</div></div>
    </div>
  </section>
</div>

<!-- NOVEL DETAIL PAGE -->
<div class="page" id="page-detail">
  <div class="detail-hero">
    <img id="detail-hero-bg" src="" alt="" class="detail-hero-bg">
    <button class="detail-back" onclick="goPage('home')">‹</button>
  </div>
  <div class="detail-body">
    <div class="detail-cover-row">
      <div class="detail-cover"><img id="detail-cover-img" src="" alt=""></div>
      <div class="detail-info">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-orig" id="detail-orig"></div>
        <div class="detail-badges" id="detail-badges"></div>
      </div>
    </div>
    <div class="detail-stats">
      <div class="stat-item"><div class="stat-val" id="detail-chapters"></div><div class="stat-lbl">チャプター</div></div>
      <div class="stat-item"><div class="stat-val" id="detail-views"></div><div class="stat-lbl">閲覧数</div></div>
      <div class="stat-item"><div class="stat-val" id="detail-rating"></div><div class="stat-lbl">評価</div></div>
    </div>
    <div class="detail-cta">
      <button class="btn-read" id="detail-read-btn" onclick="startReading()">▶ 今すぐ読む</button>
      <button class="btn-heart" id="detail-heart-btn" onclick="toggleLibrary()">🤍</button>
    </div>
    <div class="detail-tabs">
      <button class="tab-btn active" onclick="switchTab('about')">あらすじ</button>
      <button class="tab-btn" onclick="switchTab('chapters')">チャプター一覧</button>
    </div>
    <div class="tab-content active" id="tab-about">
      <p class="synopsis" id="detail-desc"></p>
      <div class="tag-list" id="detail-tags"></div>
    </div>
    <div class="tab-content" id="tab-chapters">
      <div id="chapter-list"></div>
    </div>
  </div>
</div>

<!-- CHAPTER READER PAGE -->
<div class="page" id="page-reader">
  <div class="reader-header">
    <button class="reader-back" id="reader-back-btn" onclick="goPage('detail')">‹</button>
    <div class="reader-title-wrap">
      <div class="reader-novel" id="reader-novel-title"></div>
      <div class="reader-ch" id="reader-ch-label"></div>
    </div>
    <div class="font-controls">
      <button class="font-btn" onclick="changeFontSize(-1)">A-</button>
      <button class="font-btn" onclick="changeFontSize(1)">A+</button>
    </div>
  </div>
  <div class="reader-body" id="reader-body">
    <div class="reader-ch-title" id="reader-ch-title"></div>
    <div id="reader-content"></div>
    <div class="reader-nav">
      <button class="nav-prev" id="nav-prev" onclick="prevChapter()">‹ 前へ</button>
      <button class="nav-next" id="nav-next" onclick="nextChapter()">次へ ›</button>
    </div>
  </div>
</div>

<!-- SEARCH PAGE -->
<div class="page" id="page-search">
  <div class="search-header">
    <button class="reader-back" onclick="goPage('home')">‹</button>
    <div class="search-input-wrap">
      <span style="color:#666">🔍</span>
      <input class="search-input" id="search-input" placeholder="小説、著者、ジャンルを検索..." oninput="doSearch(this.value)">
    </div>

const CHAPTER_CONTENT = {
  "1-1": `The morning mist still clung to the peaks of Dragon Blood Mountain when Long Chen opened his eyes. Pain greeted him first — a bone-deep ache radiating outward from his shattered dantian, like shards of broken jade grinding against the walls of his meridians. He lay on the cold stone floor, staring up at a cracked ceiling he recognized from a lifetime ago.\n\nIn his previous existence, Long Chen had stood at the pinnacle of the Nine Heavens and Ten Earths. He had cultivated the Nine Star Hegemon Body Art to its final, transcendent stage, becoming one of the most feared warriors across countless worlds. But that life had ended in betrayal — surrounded by those he once called brothers, his cultivation shattered, his body destroyed.\n\nYet here he was. Seventeen years old again. Powerless. He pressed two fingers against the center of his chest and reached inward. Deep within the ruined landscape of his spiritual sea, he sensed it — faint as a dying ember, but unmistakably real. A single star. Dim and flickering, barely more than a spark against the vast darkness.\n\nLong Chen sat up slowly and smiled. In his past life, it had taken him three agonizing years to reach this point from nothing. This time, armed with the memories of ten thousand battles and the cultivation insights of a lifetime, he would need far less. The enemies who had destroyed him before had no idea what was coming for them.\n\n"So," he murmured to the empty room, his voice quiet but filled with an iron certainty, "let us begin again."`,

  "1-2": `The Sacred Family compound sat at the heart of Yun Qi City like a jewel in a crown — its walls high, its guards numerous, its arrogance absolute. Long Chen passed through its outer gates the following morning with his hands clasped behind his back and a pleasant expression on his face that made the doormen deeply uneasy.\n\nHe found Sacred Yan in the training courtyard, as expected. The young master was showing off for a cluster of admirers, his Silver rank spiritual energy crackling visibly around his fists as he shattered practice stones with casual contempt. He was talented by any ordinary measure. By Long Chen's measure, he was an insect who had not yet learned to fear the sky.\n\n"Long Chen." Sacred Yan's eyes narrowed when he spotted him. "You have some nerve showing your face here. Everyone in the city knows you lost your cultivation. What exactly are you hoping to accomplish by coming to the Sacred Family compound?" The admirers laughed on cue, their mockery bouncing off the stone walls like music.\n\nLong Chen did not react. He simply looked at Sacred Yan for a long, measured moment — the kind of look that a man gives a minor inconvenience he is deciding whether to bother addressing. "I came to give you some advice," he said at last. "Your family's mining contracts in the northern valley. Sell them. All of them. Within the month."\n\nThe laughter died. Sacred Yan stared at him. "What are you talking about?" Long Chen had already turned to leave. "You'll understand soon enough," he said pleasantly. "Consider it a parting gift."`,

  "2-1": `Su Yu had always known that being human in the Myriad Races world meant starting at the bottom of everything — talent, status, resources, and hope. Humans were not the weakest race, technically. They were simply considered the most unremarkable, sandwiched between species with natural spiritual bodies, ancient bloodlines, or abilities that made battle arts look like child's play.\n\nHe sat in Study Hall Number Nine of the Ninth High School, surrounded by students from seventeen different races, and read the same line of his textbook for the fourth time without absorbing a single word. Across the room, a young man from the Rock Lizard clan was casually memorizing combat techniques that humans required weeks to understand. Next to Su Yu, a girl with the faint silver markings of the Moon Hare tribe was already practicing her racial skill under the desk.\n\nSu Yu closed the textbook. He pulled out a worn notebook instead — filled not with standard curriculum but with his own private research. For three years he had been studying the suppression of humanity, the ancient records that explained why humans had once stood at the apex of the Myriad Races world before their fall. The answers, he was increasingly certain, had something to do with willpower.\n\nHe pressed his palm flat against the desk and focused. This was not a recognized cultivation method. No teacher had approved it. But something in the back of his mind — a feeling more than a thought — told him that what he was reaching for was real, and waiting, and had always been waiting specifically for him. The air around his palm shimmered once. Faint. Barely visible. But there.`,

  "3-1": `Ten billion years of memory is not something a human mind is built to hold. Li Qiye had long since ceased to be entirely human in any meaningful sense — he had watched empires dissolve into dust, witnessed the death of immortals who believed themselves eternal, and accumulated a weight of knowledge that would crush any ordinary cultivator into madness before his third century.\n\nAnd yet here he was, seventeen years old again, standing in a city whose name he had not thought of in several million years. His new body was weak. Profoundly, almost insultingly weak. He could feel the spiritual energy of this era pressing against him from all directions — richer than he remembered from this period, which was interesting — and his current vessel could barely absorb any of it.\n\nHe was not concerned. Li Qiye had been reborn before. Not often, and never by choice, but enough times to know the pattern. The body was a container. What mattered was what filled it. He reached inward and found the ember of his true self — compressed beyond imagination, but present, and already beginning to unfurl like a flower that had been waiting ten billion years for the right season.\n\n"Young master, are you well?" A servant girl had appeared in the doorway, watching him with visible alarm. He realized he had been standing motionless in the center of his room for what was, by the clock on the wall, approximately two hours. He looked at her with ancient eyes in a young face and smiled with a warmth that surprised them both. "Better than I have been in a very long time," he said truthfully.`,

  "4-1": `The Bone Palace smelled of old magic and older ambition, which was exactly how Skeletal Lord Arveth liked it. He had spent four hundred years cultivating that specific atmosphere — the candles were rendered from the fat of defeated enemies, the walls were lined with the compressed remains of a thousand failed apprentices, and the throne itself was carved from the spine of a dragon that had made the catastrophic error of underestimating a lich.\n\nArveth examined his current predicament with the calm detachment that came from having survived considerably worse. He was, technically, dead. This was not news. He had been dead for four centuries and found the condition to have significant advantages over the alternative. What was new was that his phylactery had been cracked — not broken, not destroyed, but cracked — by the battle three days ago, which meant his immortality was temporarily compromised, his mana reserves were at thirty percent, and he had seventeen different factions who believed he was weakened enough to kill.\n\nHe needed resources. He needed them quickly. And he needed them from sources that would not immediately report his weakness to his enemies. He had, after considerable deliberation, arrived at a solution that he found deeply distasteful but undeniably practical: employment.\n\n"Send in the first applicant," he said to the skeleton standing at the door. The skeleton rattled acknowledgment and swung the doors open. A young woman entered, carrying a contract scroll and wearing the expression of someone who had either great courage or very poor judgment. Arveth folded his skeletal fingers together. "You wish to hire a lich," he said. "Tell me what you're willing to pay."`,

  "5-1": `Nie Li remembered everything.\n\nThe memories came back the moment he opened his eyes in the Holy Orchid Institute's dormitory — not gradually, not in fragments, but all at once, a lifetime of knowledge pouring into a thirteen-year-old mind like a flood through a broken dam. He lay perfectly still for a long moment, breathing carefully, letting the torrent settle.\n\nHe had died. He remembered that clearly — the final battle in Nie family's stronghold, the Sage Emperor's overwhelming power, the demon beasts that tore through the city's last defenses while he fought to buy time for the survivors. He had died knowing it was not enough. Knowing that Glory City would fall.\n\nBut he was here. He was thirteen. The city was intact around him — he could hear it through the dormitory window, the sounds of a morning that, in the original timeline, he had not paid nearly enough attention to. His roommate Duan Jian was still asleep. The smell of breakfast was drifting from the institute's dining hall. A snow wind demon howled somewhere beyond the barrier walls, routine and harmless.\n\nNie Li sat up and smiled — not the desperate, grieving smile of a man who had watched everything he loved destroyed, but something quieter and more dangerous. He had ten thousand years of cultivation knowledge in his head and a thirteen-year-old body that the Sacred Family had written off as permanently weak. He thought of all the techniques he knew that wouldn't be invented for another five centuries. He thought of the demon spirit beasts that were just now sleeping in caves they didn't yet know would make them legendary. He thought of Ye Ziyun, who was probably in the library at this very moment, and who had never once in his original life known that he loved her until it was too late.\n\nThis time would be different. Every single thing about it.`,

  "6-1": `The cube fell from the sky above the Realm of the Gods and shattered into ten thousand pieces, and the piece that fell toward Lin Ming was the size of a thumbnail and glowed with a light that had no color he could name.\n\nHe caught it without thinking — a reflex born from years of training — and felt it sink into his palm like water into dry earth. The sensation lasted less than a second. Then it was gone, absorbed, and he was standing alone in the ruins of the exhibition hall with the sounds of chaos fading around him and something fundamentally different about the space behind his sternum.\n\nLin Ming had lived in the Cloud Mist Sect for three years. He was not talented by any measure the sect recognized — no rare constitution, no powerful bloodline, no mystical encounter in childhood that had seeded his meridians with early-blooming spiritual roots. He had made it this far through a combination of stubbornness, an unusual capacity for pain, and a conviction that talent was simply effort that hadn't shown its results yet.\n\nHe pressed his fist against his chest and reached inward with his spiritual sense. There, nestled at the center of his dantian like something that had always belonged there, was a space he had never felt before — a small realm within himself, humming with a warmth that made his own spiritual energy seem like candlelight next to the sun. He pulled his hand back and stared at his palm.\n\n"What are you?" he asked quietly. The cube fragment did not answer. But somewhere deep in the newly formed space, he felt something stir, as if it had been waiting for exactly that question.`,

  "7-1": `Yun Che died on a winter morning, surrounded by people he had trusted with his life.\n\nHe felt each betrayal land like a physical blow before the actual blows came — the shift in Chu Yuechan's expression, the moment when Xia Qingyue's eyes went cold, the silence from his sworn brothers that told him everything he needed to know. By the time the attacks began, he had already died a dozen times in his mind. The body was almost an afterthought.\n\nHe fell from the Heaven Basin Secret Realm with the Sky Poison Pearl still embedded in his body and the Mirror of Samsara shattered in his hands, and he thought, with remarkable clarity for a dying man, that he had made a catastrophic mistake in believing that power was the same thing as protection.\n\nThen he woke up.\n\nNot in the afterlife. Not in darkness. He woke in a body that was unmistakably his own, in a room he recognized from fifteen years ago, with the sound of his grandfather calling his name from somewhere downstairs and the smell of the Azure Cloud Continent's mountain air coming through a window he had not looked through since childhood. The Sky Poison Pearl was in his chest. The Mirror of Samsara was whole.\n\nYun Che lay on his back and catalogued everything that had been done to him by people he had loved, and felt the grief harden into something colder and more permanent. Then he sat up, rolled his shoulders, and began to plan. He had been given a second chance. He intended to use every second of it.`,

  "8-1": `The Dragonblood Warrior clan had not produced a proper heir in three generations, and Linley Baruch had grown up inside that absence like a plant growing in thin soil — aware of it constantly, shaped by it in ways he could not always name.\n\nHe was eleven years old when his father pressed the green jade ring into his hands and told him it was the only thing left of their family's former glory. The jade was warm, oddly warm, with a depth to its color that shifted depending on the angle of the light. Linley wore it on his smallest finger and tried not to think about everything it represented.\n\nHe was twelve when the ring began to speak to him.\n\nNot in words, at first. It was more like a presence — a sense of vast age and contained power, waiting on the other side of a thin membrane. He mentioned it to no one. His teachers at the Ernst Institute were already watching him too carefully; the discovery that he might have some connection to an artifact of unknown origin would bring exactly the kind of attention his father had told him to avoid.\n\nHe was thirteen when the membrane broke. He was alone in the institute's meditation garden, deep in his daily practice, when the voice came through clear and unmistakable — gravelly, ancient, carrying in its tone the weight of someone who had lived so long that most of what he felt was amusement.\n\n"Not bad," the voice said. "For a mortal. You have something of your ancestors in you. Not much. But something." Linley opened his eyes slowly. "Who are you?" The ring pulsed once with warm light. "My name," said the voice, "is Doehring Cowart. And I have been waiting inside this ring for a very long time for someone worth teaching."`,
  "1-3": `Sacred Yan could not sleep.

He lay in his chambers staring at the ceiling, thinking about what Long Chen had said that morning. Sell the northern valley mining contracts. All of them. The advice was insane — three generations of Sacred patriarchs had built their influence on those contracts. Abandoning them would signal weakness to every rival family in the city.

And yet he could not dismiss it. In six years of watching Long Chen across classrooms and courtyards, Yan had learned to read him. And this morning there had been something in Long Chen's eyes he could not name — not arrogance, not performance, but something older. The look of a man who had already seen how this story ended.

He sat up and reached for writing paper. There were ways to quietly liquidate contracts without it looking like retreat. He would need to move carefully. He would need to move fast. And he would need to begin tomorrow, before he had time to talk himself out of it.

Outside his window, the barrier walls of Glory City hummed their low, constant note against the dark. He wrote until dawn.`,

  "1-4": `The Holy Orchid Institute library opened at dawn, and Nie Li was always the first student inside.

He had spent three days reconstructing from memory every cultivation technique he had mastered in his previous life — filling notebooks with formations, alchemical formulas, soul beast behavioral patterns, and strategic analyses that the institute would not teach for another decade. He wrote quickly, without hesitation. Ten thousand years of knowledge flowed from memory to page as naturally as breathing.

He was deep in this work when Ye Ziyun sat down across from him without asking. He looked up. She had a book open before her but she was watching him with that particular expression he remembered — sharp, curious, irritated by her own curiosity.

You have changed, she said. Not as accusation but as observed fact.

Yes, he agreed, and went back to writing.

She waited, clearly expecting more. When none came, she frowned at her book, then at him. What are you writing? He looked up and smiled — genuinely, without performance. The future, he said. She decided privately that this was the most irritating answer she had ever received, and also that she intended to find out what he meant.`,

  "1-5": `The first demon beast Nie Li bonded a Soul Ring from was a rank one Snow Wind Wolf, and he completed the binding in thirty minutes flat.

His classmates watched in stunned silence. The process normally took beginners several hours of laborious spiritual attunement. Nie Li performed it with the calm efficiency of someone who had done the same thing several thousand times before — which, of course, he had.

The Soul Ring that materialized was white, as expected. But the spiritual resonance it produced was not the thin output of a typical beginning student. It was steady, dense, already finely tuned to his cultivation pathways in ways that took most students months to achieve.

Teacher Ye Mo had been standing at the back of the training field with his arms crossed. He did not speak during the binding or immediately after. He simply looked at Nie Li with the expression of a man who had taught long enough to recognize when something was not following the expected rules.

Stay after class, he said. Nie Li nodded as though he had been expecting exactly this. He had been hoping for this conversation since his first day back.`,

  "2-2": `The willpower examination was held on a Wednesday — the day that changed everything and almost changed nothing, simultaneously.

Every student in the Ninth High School took the test in their third year. It measured baseline willpower as a predictor of cultivation potential. For human students, the results were almost invariably disappointing. The racial ceiling on human willpower was considered settled biological fact.

Su Yu sat in the examination chamber and breathed steadily. The spiritual pressure device activated. Around him, classmates began to sweat and lose focus. The Moon Hare student dropped at 200 units — exceptional for her age. The Rock Lizard student reached 280 before his technique fractured.

Su Yu did not move.

The device kept climbing. At 400 units, the administrator looked up from her panel for the first time in years. At 450, she stood. At 500 — a number not calibrated into the display because no student had ever reached it — she quietly switched off the machine and wrote one word in her assessment notebook: Unprecedented.`,

  "2-3": `Word spread through the Ninth High School with the speed of anything that contradicts established wisdom.

By Thursday morning, every student who cared about cultivation rankings knew what Su Yu had done in the willpower chamber. By Friday, three senior students had stopped him in separate corridors to question him — not friendly curiosity, but the calculating attention of people reassessing a variable they had previously dismissed.

Su Yu found this more interesting than threatening. He had been studying the dynamics of the Myriad Races world for three years. He understood that what he had demonstrated in that chamber was not just a test result; it was a declaration, made public before he was ready to make it. He needed to be careful about what came next.

He returned to his private research. The willpower method he had stumbled onto was real, but it was also rough — a first approximation of something he could sense was more complete. He needed better materials. He needed better information. And he needed, he was increasingly certain, to find someone who knew more about what humans had been before their long decline.

He opened the oldest text in the school library and began reading from the beginning.`,

  "3-2": `Li Qiye walked through the morning market of the new city and catalogued everything with the precision of someone reading a familiar book.

The spirit stone stall in the third row — the old man running it would discover something significant in his cellar in approximately eleven months. The medicine counter attendant was the grandmother of someone who would matter. The crying child by the fountain would grow into either a great hero or an irrelevant footnote; he had not decided yet whether to intervene.

He paused at a weapons stall and picked up an ordinary sword. Competently made, spiritually inert, worth perhaps three silver marks. He held it feeling the weight of something that aspired to be more than it was, and set it back down.

You are not here to buy a sword, observed the stallkeeper.

No, Li Qiye agreed pleasantly. I am here to decide how much of this city I intend to save. He turned and walked back into the crowd, leaving the stallkeeper staring after him with the deeply unsettled feeling of having spoken with someone operating on a timeline no one else could see.`,

  "4-2": `Her name was Mira Ashveil, she was twenty-three, she worked as a junior investigator for the Gray Mantle Society, and she had been waiting outside the Bone Palace for four hours before the skeleton doorman finally opened the gates.

She had used the time productively. She counted six blind spots in the undead patrol rotation, identified two structural weaknesses in the eastern wall, and determined that the cursed ward on the main gate was keyed specifically to the living. She crossed the threshold anyway, because the job required it, and noted with professional satisfaction that the curse was not lethal.

Arveth studied her across the length of his throne room and found himself mildly intrigued. Most applicants arrived either terrified or performing confidence to cover their terror. This woman appeared to be simply evaluating him. Making notes in some internal ledger.

You have excellent composure for someone standing before a lich, he observed.

You have excellent taste in cursed wards for someone who wants clients to actually reach you, she replied. The threshold hex announces visitors to your guards — so you have known I was coming for four hours.

Three hours and forty-seven minutes, he corrected. He decided he was going to enjoy this negotiation.`,

  "5-2": `Ye Ziyun had known Nie Li for six years, which she considered sufficient time to understand his limitations.

He was clever — she had always acknowledged that, even when she would have preferred not to. He had an unusual talent for pattern recognition and a stubbornness that bordered on structural. But he was Unranked, and had been since the first Soul Awakening ceremony, and that was a fact that no amount of cleverness could change.

So when he sat down across from her in the library and outlined, in calm systematic detail, a cultivation technique she had never seen documented anywhere, she experienced a complicated sequence of internal reactions that she was too disciplined to allow onto her face.

Where did you find this? she asked.

I worked it out.

No one works out a complete intermediate cultivation method from first principles at thirteen.

I did. He looked up and held her gaze with those strange steady eyes that had been bothering her for days. I can teach it to you. If you want.

She looked at the notebook. The technique was extraordinary — she could see that from a cursory glance. She looked back at him. Why?

His answer came without hesitation. Because you are going to need it.`,

  "6-2": `Lin Ming's first visit to the Smelting Trial Chamber nearly destroyed him, and he considered it a partial success.

The Chamber was a training facility of carefully regulated spiritual pressure and controlled combat trials, designed to push disciples to their limits without quite killing them. Most outer disciples visited once a month and left after twenty minutes with something bruised and their pride significantly damaged.

Lin Ming stayed for four hours.

He emerged with two fractured ribs, a hairline crack in his left scapula, spiritual depletion that would take three days to recover, and an expression that the waiting disciples later described as someone who had found exactly what they were looking for.

The Cube fragment in his dantian had been active throughout. He could feel it processing — absorbing information about each impact, each failure, each moment his technique had broken under pressure. As he settled into recovery meditation outside the Chamber, the information returned to him as adjustments: Here is where you are wasting energy. Here is the correction.

You are going to destroy yourself, said a quiet voice nearby. A girl with silver-white hair was watching him with concern mixed with irritation. I have been studying your form. Your meridian usage is incorrect.

Lin Ming blinked. In all his months at the sect, no one had ever voluntarily offered instruction. Show me, he said.`,

  "7-2": `The Sky Poison Pearl, Yun Che had learned through painful experience in his first life, was the most dangerous object on the Azure Cloud Continent and possibly in several of the realms beyond it.

It was also integrated so deeply into his meridians that removing it would be approximately as practical as removing his own heart.

He sat cross-legged on the floor of his childhood room and ran a careful internal survey. His cultivation base was exactly as weak as he remembered at this age — thin spiritual roots, slow absorption, a dantian so small that most assessment masters would politely suggest an alternative vocation. These were the weaknesses his enemies had exploited. The weaknesses he had spent a lifetime learning to overcome through methods other cultivators considered either brilliant or reckless depending on the outcome.

Deep in his meridians, coiled around the base of his dantian, the Sky Poison Pearl pulsed once. Quietly. A greeting, or an acknowledgment.

Yun Che placed his hand over his chest. In his first life he had spent years fearing the Pearl before finally understanding it was not a curse but a key. This time he intended to reach that understanding considerably sooner.

We are going to do things differently, he told it. The Pearl pulsed again. He chose to interpret this as agreement.`,

  "8-2": `Doehring Cowart was four thousand years old and had spent the last four hundred inside a jade ring, which had given him considerable time to contemplate the nature of patience.

He had met twelve previous bearers of the Coiling Dragon Ring. Most had been adequate. Two had been genuinely talented. One had come close to what he was looking for before her death in a political conflict he had been helpless to prevent.

Linley Baruch was thirteen years old, with a Dragonblood Warrior constitution that had gone completely unactivated through a century of family decline. His potential was locked behind a door he did not yet know existed. By any standard assessment he was unremarkable.

And yet.

Doehring had learned across millennia of observation that potential was not the most important variable. The most important variable was what a person did when they discovered they had been standing in front of a door their entire life.

Linley had not panicked. He had not performed excitement. He had asked, with the calm directness of someone much older, what Doehring could teach him and what it would cost.

The cost, Doehring said, is effort beyond what you currently believe yourself capable of.

Linley considered this. That sounds like every worthwhile thing, he said.

Doehring laughed — genuinely, for the first time in four centuries. Perhaps, he thought, this one would be different.`,

  "10-4": `シャオ・ウーがタン・サンに初めて自分の武魂を見せたのは、知り合って一ヶ月後だった。\n\n二人は放課後に校庭の隅で修行することが習慣になっていた。シャオ・ウーは最初は警戒していたが、タン・サンが静かで押し付けがましくないことを確認してから、少しずつ心を開いた。\n\n「見せてあげる」彼女は言った。「でも誰にも言わないで」「約束します」ピンクの光が彼女の周囲に広がった。うさぎの形をした武魂が現れた。一見すると可愛らしい。しかし霊力の密度が異常だ。\n\n前世の記憶が答えを教えてくれた。これは「聖魂」の一種だ。見た目に反して、武魂界の中でも最上位の部類に属する。\n\n「綺麗だ」タン・サンは言った。彼女は少し驚いた顔をした。「怖くないの？ 皆、不思議がるか怖がるかのどちらかなのに」「なぜ怖がるんですか。美しい武魂ですよ」シャオ・ウーはしばらく彼を見つめた。「変わった人ね」「よく言われます」タン・サンは笑った。前世でも同じことを言われた気がする。`,

  "10-5": `学院間の交流試合の案内が届いたのは、入学から三ヶ月後のことだった。\n\n青霊学院対隣町の白霊学院。魂師の卵たちによる親善試合。参加は任意だが、出場することで奨学金が得られる可能性がある。\n\nタン・サンとシャオ・ウーは迷わず参加を決めた。\n\n問題はシャオ・ウーが武魂を公開したくないことだった。「白うさぎの武魂を見せたら笑われる」「笑う者は後で泣きます」「それは怖い言い方ね」「事実を言ったまでです」\n\nタン・サンは自分の出場種目を考えた。白虎武魂は使えば目立ちすぎる。まずは青銀草の魂技で戦うことにした。青銀草の魂技は攻撃力こそ低いが、その複雑な蔓の操作は、上手く使えば相手を拘束できる。\n\n試合当日。タン・サンの対戦相手は白霊学院の代表選手だった。霊力は二段上。しかしタン・サンが最初に放った蔓の動きを見て、試験官が思わず立ち上がった。十歳の子供が使う蔓の制御が、あまりにも精密だったからだ。`,

  "11-4": `旅立ちの日は、イー・ユンが十二歳になった春に来た。\n\n牛角村には修行の場がない。これ以上ここにいても、基礎しか積み上げられない。隣の町に修行場があると行商人から聞いた。費用がかかるが、前世の記憶にある錬丹の知識を使えば資金は作れる。\n\n「行くの」リン・シンユーは言った。泣いていない。ただ真っ直ぐに彼を見ていた。「そのうち戻ります」「いつ」「分からない。でも戻る」「約束？」「約束」リン・シンユーは少し考えた。「じゃあ、私も強くなって待っている」「それは頼もしい」\n\nイー・ユンは村の入り口で振り返った。小さな村。平凡な生活。しかしこの二年間は確かに必要な時間だった。基礎を整え、この時代を理解し、次のステップへの準備を整えた。\n\n前世では何百年という時間をかけた修行を、今世では違うやり方でやり直す。急ぐ必要はない。ただし立ち止まる必要もない。彼は南へ向けて歩き始めた。`,

  "11-5": `隣町の修行場は「玄武道場」という名前だった。\n\n入会費が必要だ。イー・ユンは町に着いた最初の日に薬草市場を探した。前世の知識で、この時期にこの地域で採れる薬草の価値を知っている。市場で一日かけて交渉し、持参した山野草を売って入会費を工面した。\n\n道場の師範は厳格な老人だった。新入りを試す時、必ず最初に基礎体術を見る。「立て。動いてみろ」イー・ユンは基礎の型を演じた。前世の動きをそのまま使うのではなく、十二歳の子供らしい「上手だが粗削り」な動きを意識して。\n\n師範は首を傾げた。「お前、どこで習った」「独学です」「嘘をつくな。この動きは基礎だが、理解して動いている」「本を見て練習しました」「どんな本だ」「村の古老から借りた、古い修行書です」師範はしばらく考えた。「まあいい。入会を認める。ただし基礎から全てやり直す。文句はないな」「はい」イー・ユンは内心で苦笑した。三十三天の人皇が、また一年生からやり直しだ。`,

  "12-4": `ロロ・リンがムー・チェンに声をかけたのは、学院に入って二ヶ月後だった。\n\nロロ・リンは一年生の中では有名な存在だ。特別な血統を持つ美少女で、霊力も際立っている。なぜ彼女がムー・チェンに話しかけてきたのか、周囲は首を傾げた。\n\n「授業中、あなたを見ていた」彼女は言った。「先生の問題を解く時、計算の順序が普通じゃない」「変でしたか」「変というより、効率的。どこで覚えた？」ムー・チェンは少し考えた。「自分で考えました。北方霊院では教わらなかったので」「追放されたって聞いた。本当？」直接だ。「本当です」「理由は？」「派閥の対立に巻き込まれました」「あなた自身の問題じゃないんだ」彼女は確認するように言った。「はい」「ならいい」ロロ・リンはそれだけ言った。何を確認したかったのか、ムー・チェンには分からなかった。しかし彼女がその後、定期的に声をかけてくるようになったことは確かだった。`,

  "12-5": `北嶺学院の試練場は、月に一度開放される。\n\n霊力を高める特別な場所だ。場内は外部の霊力が圧縮されており、通常の三倍の速度で修行できると言われている。ただし入場には費用がかかる。ムー・チェンには余裕がない。\n\n「一緒に入る？」ロロ・リンが言った。「費用は割り勘で」「なぜ」「一人で修行するより、見張り役がいた方が効率がいい。あなたは真剣だから適任」理由はシンプルだった。ムー・チェンは承諾した。\n\n試練場の中は、確かに特別だった。霊力の密度が違う。呼吸するだけで体内の霊力が刺激される。ムー・チェンは基礎修行に集中した。特別な技など使わない。ただ基本を、この環境で繰り返す。\n\n二時間後、退場した時、ロロ・リンは言った。「あなた、修行中に一度も休まなかった」「時間が惜しいので」「普通は途中で限界が来る。霊力が尽きる」「慣れています。北方霊院では資源が少なかったので、少ない霊力で最大の効果を出す方法を自然と覚えました」ロロ・リンは少し考えた。「それ、教えてくれる？」`,

  "9-4": `薬老の最初の課題は、材料の採集だった。\n\n「町の南に薬草園がある」薬老は言った。「そこで玄霜草を三本、黒峰花を一本、それと松霊草を五本集めてこい」シャオ・ヤンは首を傾げた。「錬丹の材料ですか」「そうだ。お前が次に飲む丹薬を自分で作る。材料から始めるのが基本だ」\n\n薬草園は町はずれにある。入場料がかかる。シャオ・ヤンは残り少ない小遣いを使った。園内では薬師見習いたちが作業している。その中に混じって、目的の薬草を探す。\n\n玄霜草はすぐ見つかった。黒峰花は少し時間がかかった。問題は松霊草だ。今の時期は採取量が少なく、売り切れていた。「また来月」と係員に言われた。\n\n「松霊草がない」シャオ・ヤンは薬老に報告した。「ならば代替材料を探せ」「代替材料？」「同じ効果を持つ別の材料を探す方法を考えろ。それが薬師の基本だ」シャオ・ヤンは唸った。材料が揃わない時の対処法まで、最初から学ばされるのか。薬の道は、思っていたより深かった。`,

  "9-5": `シャオ家の三大長老会議が開かれた。\n\nシャオ・ヤンの現状について話し合うためだ。三年前から霊力が伸びない。その原因は依然不明。このまま成果が出なければ、婚約も家の後継者としての立場も危うくなる。\n\nシャオ・ヤンは廊下から声を聞いた。意図せずに聞こえてしまった形だが、内容は参考になった。家族が心配しているのは分かる。同時に、誰も本質を見ていないことも分かった。\n\n「聞いていたか」薬老が言った。「はい」「どう思った」「家族は善意で心配している。ただし間違った方向に」「その通りだ。では正しい方向は何だ」シャオ・ヤンは考えた。「霊力の量ではなく、質を改善すること。あとは……」「時間だ」薬老が続けた。「良い修行には時間がかかる。焦る者は基礎を固める前に壁にぶつかる」\n\nその夜、シャオ・ヤンは父のところへ行った。「心配をかけてすみません」「お前が謝ることではない」父は言った。「ただ元気でいてくれ。それだけでいい」シャオ・ヤンは頷いた。元気でいる。それは約束できる。`,

  "9-6": `初めて作った丹薬が完成した日、シャオ・ヤンは三時間それを眺めていた。\n\n普通の人が見れば、何の変哲もない小さな丸薬だ。薄い緑色で、僅かに霊力の気配がある。市場で買えば二十文もしない。\n\nしかしシャオ・ヤンにとって、これは四ヶ月の努力の結晶だった。失敗した炉の数は三十七回。材料を無駄にした回数は数えきれない。薬老に怒られた回数は百回を超えた。\n\n「飲め」薬老は言った。「自分で作ったものを信用できないのか」シャオ・ヤンは丸薬を口に含んだ。溶ける感覚。わずかな温もりが体内を流れた。\n\n「どうだ」「……少し、霊力の流れがよくなった気がします」「気がするではない。実際に改善されている。微量だが」薬老は珍しく具体的な評価を口にした。「これが起点だ。この感覚を忘れるな。薬師は自分の体で薬を理解しなければならない」シャオ・ヤンは頷いた。四ヶ月かけて、ようやく起点に立った。長い道のりだが、確かに始まった。`,

  "9-7": `シャオ・シュエが彼に声をかけてきたのは、久しぶりのことだった。\n\n婚約者。しかし三年間、彼が力を失ってからは距離を置いている。周囲の目もある。強者と弱者の婚約という現実を、彼女も感じているのだろう。\n\n「修行はしているの」彼女は聞いた。「しています」「どんな修行を」シャオ・ヤンは少し考えた。「薬師の勉強と、内功を少し」シャオ・シュエは首を傾げた。「薬師？ 武人の修行ではなく？」「両方します。ただ今は薬の方が先決で」彼女は何か言いかけた。しかし止めた。「そう」それだけ言って立ち去った。\n\n「気まずそうだったな」薬老がコメントした。「少し」「女心は薬より難しい」意外な言葉だった。「薬老も昔、そういう経験が？」「四百年も生きていれば色々ある」「話してください」「いつかな」薬老は笑った。シャオ・ヤンは初めて、指輪の中の老人に親しみを感じた。`,

  "1-10": `神聖家の陰謀は、予想より二ヶ月早く動き始めた。\n\nロン・チェンが察知したのは、城下の薬屋で偶然耳にした会話の断片だ。「南の採掘場に例の品が届く」「神聖ヤン様の指示通りに」それだけで十分だった。前世の記憶が、この言葉の意味を即座に教えてくれた。\n\n神聖家は魔獣の魂骨を不正に流通させようとしている。この時代の法では厳しく禁じられている行為だが、証拠を掴んだ者がいなかった。いや、正確には、証拠を掴んだ者が消されてきた。\n\n今回は違う。ロン・チェンには彼らの手口が全て分かっている。どこに証拠を隠し、誰を使って運搬し、いつ取引が行われるか。彼は動いた。ただし自分ではなく、別の手を使って。学院の監査役に対して、「偶然気づいた」ふりをして情報を流す。証人になるのは自分ではない。神聖家が最も信頼している下働きの男だ。前世の記憶では、この男は後に家族を守るために神聖家を裏切った。その時期を、少しだけ早める。`,

  "1-6": `ロン・チェンが初めて自分の気脈に新たな星の輝きを感じたのは、神聖蘭花学院の古い鍛錬場で一人修行していた深夜のことだった。\n\n九星覇体の術は、常人では理解すら難しい古代奥義だ。前世においてロン・チェンはこの術を最高境地まで極めたが、それには数百年の歳月を要した。しかし今世の彼には、その全ての記憶がある。理論ではなく、血と骨に刻まれた体験として。\n\n「二つ目の星が目覚める」彼は静かに呟いた。丹田の奥深くで何かが共鳴し、灼熱の気が脊椎を駆け上がる感覚があった。普通の修行者なら激痛で意識を失うはずの過程を、彼は静かな笑みを浮かべながら受け入れた。\n\n夜明けが近い頃、鍛錬場の石畳にひびが入った。ロン・チェンが立ち上がると、彼の足元には細かな亀裂が放射状に広がっていた。二星境界への突破。本来なら数年かかる段階を、たった一晩で越えた。外には誰もいない。それでよかった。この力を見せるべき相手は、まだ時が来ていない。`,

  "1-7": `薬師ギルドの競売が開催されるという知らせは、グローリー・シティ全体に広まった。今年の目玉は三級霊薬「天心丹」だという。修行者の丹田を広げ、霊力の上限を一時的に押し上げるこの丹薬は、神聖家のような大家でさえ喉から手が出るほど欲しがる代物だ。\n\nロン・チェンは競売の三日前から行動を開始していた。前世の記憶によれば、天心丹の主要成分である「玄霜草」は南東の薬草市場に今週入荷するはずだ。一般には知られていない情報だが、彼には分かる。\n\n彼が玄霜草を購入した時、市場の薬師たちは奇妙な顔をした。腕白な子供が何の役にも立たない雑草を買っていく。そう思ったことだろう。ロン・チェンは気にしなかった。\n\n三日後の競売会場。天心丹が登場した瞬間、会場は静まり返った。しかしロン・チェンはすでに同等の効果を持つ丹薬を自製し、服用済みだった。彼が注目していたのは別の物だった。競売に紛れ込んだ、誰も気づいていない古代の丹薬の処方書。前世でさえ入手できなかった幻の一品が、安値で出品されていた。`,

  "1-8": `葉紫雲との模擬戦は、彼女の提案だった。\n\nロン・チェンが彼女の修行に口を出したのは三度目のことだったが、今回は彼女も黙って聞き流さなかった。「あなたが本当に私より優れているなら、証明しなさい」鋭い目がそう言っていた。\n\n鍛錬場に二人きり。葉紫雲は銀階層の修行者だ。ロン・チェンの現在の霊力などより遥かに格上。本来なら勝負にならない。\n\n模擬戦が始まった瞬間、葉紫雲は驚いた。ロン・チェンが動かなかったのだ。ただ立っている。彼女の攻撃が迫るたびに、最小限の動きで躱す。まるで彼女の次の一手が全て分かっているように。\n\n「貴方の左足の踏み込みが〇・二歩分浅い」三度目の攻撃を避けながら、ロン・チェンは穏やかに言った。「そこを修正すれば、突きの速度が三割上がる」葉紫雲は動きを止めた。指摘は正確だった。彼女が一人で悩み続けていた課題だ。「なぜ知っているの」「見ていれば分かる」彼は笑った。その目の奥に、六年間のクラスメートのものとは思えない深さがあった。`,

  "1-9": `魔獣の森の入り口に、見慣れない足跡があった。\n\nグローリー・シティの外壁より南二十里の地点。ロン・チェンがここを訪れるのは二度目だ。前世では三十歳を過ぎてからようやく踏み込んだこの場所に、今は十三歳の体で立っている。\n\n足跡は大型の雪嵐魔獣のものだった。しかし方向がおかしい。普通なら山の奥へ向かうはずの魔獣が、シティの方へ歩いている。群れで。\n\nロン・チェンは地面に手をついた。土の震動から、数を読む。十二頭。全て成体。これは通常の行動域逸脱ではない。何かが森の奥で魔獣たちを追い立てている。\n\n彼は走った。シティへ向けてではなく、森の奥へと。守護者たちに伝える前に、原因を確認しなければならない。前世の記憶が警告していた。この時期、この場所で起きた「森の異変」の真の原因を、当時の大人たちは最後まで理解できなかった。しかしロン・チェンには分かる。それは魔獣の暴走ではなく、誰かの意図的な誘導だ。`,

  "10-1": `タン・サンが闘羅大陸に生まれた時、武魂覚醒の儀式はすでに六歳から行われていた。\n\n武魂は魂師の根本。人はそれぞれ異なる武魂を持ち、その武魂によって歩む道が決まる。炎、氷、光、影……強力な武魂を持つ者は宗派から迎えられ、弱い武魂を持つ者は平凡な生を送る。\n\nタン・サンの武魂覚醒の儀式は、静かな村の小屋で行われた。村の魂師が霊力を流し込み、覚醒を促す。\n\n最初に現れたのは青い銀草。平凡で、戦闘向きではない一般的な武魂だ。村人たちは落胆した表情を見せた。しかしその次の瞬間、何かが違った。青い銀草の周囲から、もう一つの気配が溢れ出した。\n\n二つ目の武魂。双魂の持ち主は万人に一人も存在しない。村の魂師は手が震えた。「白虎……」二つ目の武魂は白い虎の形を取った。攻撃型の最上位武魂の一つ。一般的な武魂の青い銀草と、希少な白虎。この組み合わせを持つ者を、彼は聞いたことがなかった。`,

  "10-2": `タン・サンが青霊学院を選んだのは、最も有名な学院ではなかったからだ。\n\n前世の記憶には、強すぎる嫉妬と競争が才能を歪める場所がいくつかあることが刻まれている。最初から最上位の学院に入ることは、必ずしも最善ではない。まず基礎を固め、仲間を見つけ、準備を整える。\n\n青霊学院は小さな学院だ。生徒は三十人ほど。先生は年老いた魂師が数名。しかしタン・サンの目的地は学院そのものではなく、そこにいるはずの人物だ。\n\n初日のクラスで、一人の少女が目に入った。紫の長い髪、冷静な瞳。彼女の周囲だけ空気が微かに揺れている。隠された武魂の気配。彼女はまだ意図的に隠しているが、タン・サンには分かる。強い武魂だ。\n\n「隣に座っていいですか」タン・サンは聞いた。少女は一瞬だけ彼を見た。「どうぞ」それだけ言って視線を前に戻した。タン・サンは座りながら考えた。シャオ・ウー。この名前を覚えている。彼女がこの先の旅においていかに重要な存在になるか、彼は知っている。しかし今はただの初対面だ。焦ることはない。`,

  "10-3": `最初の魂環を獲得するための魂獣狩りは、通常なら師匠と一緒に行う。\n\nしかしタン・サンには師匠がいない。青霊学院の先生たちは彼の武魂を見て、それぞれの意見を述べた後、誰も申し出てこなかった。双魂の持ち主を導ける者が、この小さな学院にはいなかったのだ。\n\nタン・サンは一人で山に入ることを決めた。前世の記憶がある。この山のどこに、どんな魂獣がいるかを知っている。最初の魂環に相応しい魂獣も、すでに選んでいた。\n\n山に入って六時間。目的の場所に着いた。小川のほとりに、三十年物の兎魂獣がいた。戦闘力は高くないが、俊敏性を強化する魂技を与える良質な魂環だ。\n\n戦いは短かった。タン・サンは白虎武魂を解放し、正面から仕掛けた。三往復の攻防。魂獣は倒れた。魂環が輝き、タン・サンの右手に宿った。一つ目の黄色の魂環。これが全ての始まりだ。彼は山を下りながら、次の目標を頭の中で整理していた。`,

  "11-1": `イー・ユンが生まれ変わったのは、真武世界の最も辺境の村だった。\n\n前世では三十三天の人皇として、修行界の頂点に立った。あらゆる強者と戦い、あらゆる秘術を習得し、最終的には……記憶がそこで途切れる。死ではなく、何かが起きた。そして今、彼は七歳の少年の体にいる。\n\n村の名前は牛角。百人ほどが暮らす小さな集落。修行者は一人もいない。霊力の流れも薄く、外の世界とはほとんど隔絶されている。\n\nイー・ユンはこの状況を受け入れることにした。慌てても意味はない。修行の再開は体が成長してからで十分だ。それまでの間に、この時代の情報を集める。前世と今世では、どれだけ時代が離れているのか、まだ分かっていない。\n\n「ユン、何を考えているの」隣に住む幼馴染の少女、リン・シンユーが声をかけた。「世界のことを」「難しいことばかり考えている」「そうかもしれない」イー・ユンは笑った。七歳らしい笑い方を意識しながら。前世の記憶が全てある状態で、子供のように振る舞うのはなかなか難しい技術だと気づき始めていた。`,

  "11-2": `村の古老が持っていた修行の書を、イー・ユンは借りた。\n\n正確には「発見した」という形にした。納屋の片隅に無造作に置いてあった。古老も存在を忘れていたらしい。「何が書いてあるか分かるか」と古老は笑いながら聞いた。「少し読んでみました」「難しい文字ばかりだろう」イー・ユンは少し考えた。前世で習得した数十の言語の一つと一致する。「なんとなくは」「そうか。賢い子だ」\n\n書の内容は基礎の呼吸法だった。修行の入門以前の段階。前世のイー・ユンには不要だが、今の体には重要だ。\n\n毎朝、日の出前に起きて書の通りに呼吸する。一ヶ月が経った。変化は小さいが確かにある。体が少し軽くなった気がする。霊力の流れが、以前より感じ取りやすくなった。\n\n前世の記憶を使えば、もっと速く進める。しかし今は慎重に行く。この時代に何が起きているか、何が変わっているか、まだ分からないことが多すぎる。情報を集めながら、少しずつ。`,

  "11-3": `牛角村に行商人が来た。年に二度しか来ない珍しい訪問者だ。\n\nイー・ユンは行商人の荷物をしげしげと見た。外の世界の品々。修行用の低質な霊力石、簡単な丹薬、地図、書物。特に書物に目が行った。「それはいくらですか」「坊や、買えるか？」行商人は笑った。「村の子供に買えるような値段じゃないよ」「見るだけなら？」行商人は少し考えた。愛嬌のある子供だ。「一分だけな」\n\nイー・ユンは最も薄い書物を手に取った。「修行界地理概要」という題だ。一分で読み終えた。情報が整理される。現在地が分かった。そして何より重要なこと——この時代は、前世より少なくとも三千年は前の時代だということが分かった。\n\n「ありがとうございます」彼は書物を返した。行商人は首を傾げた。あの短時間で何を読んだのか。しかし問い直す前に、少年は走って行ってしまった。`,

  "12-1": `ムー・チェンが北方霊院を追放された日、空には雪が降っていた。\n\n理由は些細なことだった。いや、正確には些細ではなかった。派閥間の対立に巻き込まれ、ムー・チェンは「不正行為」の名目を着せられた。証拠はない。しかし有力な長老が言い張れば、若い弟子の言葉など届かない。\n\n院外に放り出されたムー・チェンは、三日間途方に暮れた。手元にあるのは僅かな路銀と、ぼろぼろの修行着だけ。\n\n四日目の夕方、彼は決めた。諦めることを諦める。\n\n霊の道は一つではない。北方霊院が全てではない。もしあそこで修行し続けていたら、いつかは力をつけたかもしれない。しかしあの場所での成長には限界があった。追放は、むしろ機会かもしれない。\n\n彼は南へ歩き始めた。次の目的地は「北嶺学院」。入試は難しいが、実力主義と言われている。もし実力を示せれば、出身など関係ない。ムー・チェンはそう信じることにした。`,

  "12-2": `北嶺学院の入試は、霊力比べではなかった。\n\n受験者たちが集められた広場で、主任試験官は言った。「今日の試験は三つ。霊力測定、学科試験、そして状況判断」最後の「状況判断」という言葉が引っかかった。\n\n霊力測定は特に問題なかった。ムー・チェンは霊力九段の下段。優秀とは言えないが、合格ラインは超えている。学科試験は霊術の基礎理論が中心。北方霊院で叩き込まれた知識が役に立った。\n\n問題は状況判断試験だった。受験者を五人ずつのグループに分け、「霊の迷路」に送り込む。出口を見つけることが目標。ただし迷路内には他のグループもいる。\n\nグループに入った瞬間、ムー・チェンは全員の顔を見た。一人は北方霊院の出身者だった。彼の名前はヤン・グァン。ムー・チェンを追放する口実を作った派閥の弟子だ。\n\n「偶然だな」ヤン・グァンは笑った。ムー・チェンは答えなかった。迷路の出口を考えることの方が重要だ。過去の怒りは、今は邪魔になる。`,

  "12-3": `北嶺学院の入学後、最初の一ヶ月は「観察期間」と呼ばれていた。\n\n新入生を品定めする期間だ。上級生が新入生の実力を見て、勧誘したり、逆に圧力をかけたりする。ムー・チェンには覚悟があった。北方霊院で似たようなことを経験しているから。\n\n違ったのは、ここには「実力主義」という明確なルールが機能していた点だ。強い者が弱い者を傷つけることは禁じられていないが、弱い者が実力で強者を倒した場合、その強者を侮辱してはならない。奇妙なルールだが、一種の公平さがある。\n\nムー・チェンの最初の試練は入学二週間後に来た。上級生の一人が「試合」を申し込んできた。三年生の劉雷、霊力十三段。格差は大きい。しかし断れば懦弱とみなされる。\n\n試合は予想通り厳しいものになった。ムー・チェンは三分間で三回倒された。しかし三回とも自力で立ち上がった。最終的に霊力を使い果たして動けなくなった時、劉雷は言った。「根性だけはある」それはこの学院では、最低限の評価だった。`,

  "2-4": `蘇宇が「意志力」という概念を体系的に研究し始めたのは、十四歳の夏だった。\n\n万族世界において、人族は長らく「最も平凡な種族」とされてきた。天賦の血統もなく、特殊な体質もなく、古代から受け継いだ種族技能もない。しかし蘇宇は、古文書を読み漁るうちに一つの事実に気づいた。かつて人族は、この世界の頂点に立っていた。\n\n図書室の一番奥、埃をかぶった棚の最下段。「上古人族秘録」という文書。誰も手に取った形跡がない。蘇宇は一晩かけてそれを読んだ。\n\n人族の真の力は血統にも体質にも宿らない。それは「絶対意志」という概念の中にある。どんな精神攻撃も退け、どんな逆境でも信念を折らない。それは修行によって培われるものではなく、極限の状況で初めて目覚めるものだと記されていた。\n\n試験場での出来事から一週間後。蘇宇は夜の訓練場で一人、石の壁に向かって立っていた。意志力を意図的に高める方法を、彼は独自に編み出しつつあった。誰も教えてくれないなら、自分で見つけるしかない。`,

  "2-5": `万族第九高校に転校生が来た。竜族の血を引く少女だった。\n\n名前は劉炎。その右腕には鱗のような模様が走っており、立つだけで周囲の気温が数度上がった。種族技能「焰龍掌」の使い手として、すでに修行界では名が知れている。\n\n彼女のクラスは蘇宇と同じだった。\n\n初日の実技試験。劉炎は軽く手を振るだけで訓練用の石板を砕いた。クラス中が沸いた。その後、試験官が蘇宇を指名した時、教室は少し静まった。あの「意志力試験で記録を出した人間」として、蘇宇の名前は広まっていたからだ。\n\n蘇宇は石板の前に立った。攻撃技能はない。霊力も平均以下だ。しかし彼が石板に触れた瞬間、不思議なことが起きた。石板にひびが入った。物理的な力ではない。意志の圧力が、物質に干渉した。試験官は記録票に何かを書いた。劉炎だけが、蘇宇の手が微かに震えていたことに気づいていた。全力を出し切っていた、ということに。`,

  "2-6": `人族研究会は、蘇宇が一人で始めた。\n\n最初は誰も来なかった。当然だ。人族の歴史を研究する意義など、この時代の誰にも見えていない。ポスターを貼っても、翌日には剥がされているか落書きされていた。\n\n三週間後、一人が来た。人族の女子生徒で、名前は陳夏。成績は中の下、種族技能なし、特別な体質なし。完全なる「普通」。しかし彼女には際立った観察眼があった。「あなたが意志力試験で500を出したのを見ていた」と彼女は言った。「あれはどうやったの」\n\n蘇宇は説明した。押し付けるのではなく、一緒に考えるように。陳夏は黙って聞き、質問した。鋭い質問だった。\n\n翌週、また一人増えた。その翌週、さらに二人。全員が人族で、全員が「普通」だった。蘇宇は気づいた。普通の人間が集まると、普通でない何かが生まれることがある。研究会は少しずつ、確かなものになっていった。`,

  "3-3": `リー・チーウェイが最初に手を付けたのは、この都市の地下に眠る霊脈だった。\n\n十億年の記憶は、この大陸のあらゆる霊脈の位置を正確に記録している。表面には見えないが、地下三十丈のところに古代の霊気の流れがある。この時代の修行者には感知できないはずだ。しかし彼には分かる。\n\n彼は廃屋を借りた。家賃は安く、住人は誰もいない。地下室に降り、床の特定の場所に両手をついた。霊脈への接続。現在の器はあまりにも脆弱だが、それは問題ではない。水は器を選ばない。ただ流れる。\n\n一週間後、廃屋の近所の住人が気づいた。その建物の周囲だけ、植物の育ちが異常に良い。土に活気が戻っている。老人たちは「この土地に霊気が戻った」と喜んだ。誰もその廃屋に住む少年が原因だとは思わなかった。\n\nリー・チーウェイは毎朝、そこで一時間修行した。十億年を費やして積み上げた境地の欠片を、少しずつ取り戻しながら。焦ることはない。彼には時間がある。無限とは言わないが、十分すぎるほどの時間が。`,

  "3-4": `城内で名を馳せた若き剣士が、リー・チーウェイに挑んできた。\n\n理由は単純だった。リー・チーウェイが北区の演武場で古い型の基礎練習をしているのを見た剣士が、「あの凡人に負けるわけがない」と仲間に言い切ったからだ。名誉のために証明が必要になった。\n\n挑戦を受けた時、リー・チーウェイは手に持っていた饅頭を食べ終えた。「いいだろう」\n\n剣士が最初の一撃を放った瞬間、何かがおかしいと気づいた。避けられた。ただ避けられたのではない。まるで最初からそこには何もなかったかのように、リー・チーウェイは動いていた。\n\n三十秒後、剣士は地面に座っていた。痛みはない。傷もない。しかし剣は手元になく、五歩離れた場所に刺さっていた。いつ、どうやって取られたか、全く分からなかった。\n\n「基礎が大切だ」リー・チーウェイは穏やかに言った。「一万年磨いた基礎は、十年磨いた奥義に勝る」剣士には意味が分からなかった。しかし不思議と、反論する気にはなれなかった。`,

  "3-5": `古老が彼を呼び止めたのは、市場の帰り道だった。\n\n見た目は七十代ほどの老人。しかしリー・チーウェイは即座に察した。この老人の霊力は相当なものだ。この時代でも、相当な使い手に属する。\n\n「少し話さないか」老人は言った。断る理由はない。\n\n茶館の隅の席。老人は茶を一口飲んでから言った。「あなたは何者ですか」\n\nリー・チーウェイは考えた。嘘をついても意味はない。かといって真実を全て話す必要もない。「旅人です」「旅人が廃屋の霊脈を活性化させる」老人は静かに微笑んだ。「あの霊脈は五百年前に枯れたと言われていた」\n\n「枯れた霊脈も、適切な刺激を与えれば目覚める」リー・チーウェイは答えた。「木が古くなっても、根が死んでいなければ芽吹くように」老人は長い間、彼を見つめた。「この都市に何をしに来た」「見物です。この時代の景色を、しっかりと目に焼き付けておきたい」老人には意味が分からなかった。なぜ「この時代」という言い方をするのか。しかし問い直す前に、少年は席を立っていた。`,

  "4-3": `ミラ・アシュヴェイルとの契約は、三日間の交渉を経て成立した。\n\nアルヴェスが提示した条件は三つ。一つ、依頼内容の全詳細を事前開示すること。二つ、報酬は金銭ではなく希少な魔法素材で支払うこと。三つ、いかなる状況下でも彼の真名を他者に明かさないこと。\n\nミラは二つ目の条件で粘った。「魔法素材の相場は変動します。金銭の方が公平では」「私に金銭は必要ない」アルヴェスは答えた。「しかし竜骨粉と月花石英は必要だ。あなたの組織ならば入手できるはず」ミラは手帳で何かを確認した。「月花石英は高い」「フィリア大陸での私の仕事と比べれば安い」\n\n最終的にミラが折れた。\n\n最初の依頼は情報収集だった。グレイ・マント協会が追っている失踪した研究者の足取りを辿ること。アルヴェスには不死者のネットワークがある。死者は多くのことを知っており、適切な対価があれば話してくれる。\n\n「四日以内に情報を揃える」アルヴェスは言った。「その間、あなたはここで待機しなさい」「骨の宮殿で？」「居心地は保証しない。ただし安全は保証する」ミラは周囲の骸骨を見回した。「精一杯信じてみます」`,

  "4-4": `死者からの情報収集は、アルヴェスにとって最も得意とする技術の一つだった。\n\n骨の宮殿の最下層、儀式の間。彼は六体の霊を召喚した。全て、過去五年以内にこの大陸で死んだ者たち。その中に、行方不明の研究者と接触があった人物が二人いた。\n\n霊との対話は繊細な作業だ。死者は真実を語るが、全てを語るわけではない。適切な質問を、適切な順序で行わなければならない。アルヴェスは四時間をかけて情報を整理した。\n\n研究者は生きている。しかし自発的に失踪したのではない。彼が発見した古代の遺物を巡って、三つの勢力が争っていた。研究者は今、その中の一つに「保護」という名目で囚われている。\n\n翌朝、アルヴェスはミラに情報を伝えた。「場所の特定は？」「南東の廃城。ただし」彼は付け加えた。「その廃城は表向き無人だが、内部に高位の術者がいる。あなたの協会だけでは対処が難しい」「どれくらい難しい？」「私が同行すれば、問題ない」ミラは少し考えた。「追加料金は？」「龍牙一本」高い、と彼女は思った。しかし断らなかった。`,

  "4-5": `廃城への潜入は夜明け前に行われた。\n\nアルヴェスは死のオーラを完全に抑制した状態で移動できる。生者の探知術にも不死者の感知術にも引っかからない。四百年の経験が生んだ技術だ。ミラも自分なりに気配を消していたが、アルヴェスの目から見れば「まあ合格」という程度だった。\n\n内部は想定より複雑だった。魔法的な結界が三重に張られており、それぞれ異なる術式を使っている。アルヴェスは一つ目の結界を解析した。三十秒。二つ目は五十秒。三つ目は少し手間取った。一分半。\n\n「速い」ミラは言った。「当然だ」アルヴェスは答えた。「私はこれらの術式が作られた時代を生きていた」\n\n研究者は地下三階の部屋にいた。思ったより元気そうだ。拘束されているが、傷はない。彼を「保護」している勢力は、知識を求めているのであって、研究者の命を奪うつもりはなかった。「帰る気はあるか」アルヴェスは部屋の入り口から問いかけた。研究者は暗闇の中でリッチを見上げた。「選択肢があるなら」「ある」「では是非」撤退は十二分で完了した。`,

  "5-3": `霊力の格付け試験は半年に一度行われる。\n\nニエ・リーが試験会場に現れた時、同級生たちは内心で笑った。無階位のニエ・リーが何を期待して来ているのか。試験官でさえ、結果は分かりきっていると思っていた。\n\n試験は霊力測定石に手を触れ、霊力の強度と属性を計測するものだ。最初の数人が終わり、結果はいずれも予想通り。神聖ヤンが銀階位を確認し、満足げに笑った。\n\nニエ・リーの番が来た。彼は測定石に手を置いた。\n\n最初の五秒は何も起きなかった。測定石は沈黙していた。ニエ・リーは目を閉じて、前世で習得した霊力制御法を使い、最小限の霊力だけを測定石に流し込んだ。\n\n石が光った。弱い光だ。一階位相当。そこで彼は止めた。試験官が記録した。「ニエ・リー、一階位確認」その瞬間、会場の空気が変わった。昨日まで無階位だった者が、一夜で一階位になった。小さな驚きだが、確かな驚きだった。神聖ヤンの笑みが微かに消えた。ニエ・リーは何も言わずに会場を出た。`,

  "5-4": `ニエ・リーが丁寧に育てている秘密がある。葉紫雲には気づかれていない、一つの計画だ。\n\nグローリー・シティの東区に小さな錬丹炉がある。廃業した薬師が置いていったもので、今は誰も使っていない。ニエ・リーはそれを月に二百文で借りた。\n\n錬丹術。前世では彼は一流の錬丹師だった。今の師範レベルの錬丹術など、目をつむっても作れる。しかし今世では「独学で覚えた」という設定を維持しなければならない。\n\n最初に作ったのは「霊気凝縮丹」。一般的な一級丹薬で、市場では三十文で売られている。彼が作ったものは見た目は同じだが、品質が段違いだった。しかしそれを売る時、彼は五十文ではなく二十五文で売った。\n\n「なぜ相場より安く？」薬屋の主人が不思議そうに聞いた。「まだ修行中なので」ニエ・リーは笑った。「品質に自信がないから」薬屋の主人は丹薬を一つ試した。目を丸くした。これは間違いなく一級品、いや、それ以上だ。しかし少年が「自信がない」と言っているから……彼は黙って買い続けることにした。`,

  "5-5": `魔獣の咆哮がグローリー・シティの南壁に響いた夜、ニエ・リーはすでに外に出ていた。\n\nこの日を彼は知っていた。前世の記憶に刻まれた日付。黒雷炎虎、成体。グローリー・シティへの初めての大型魔獣侵入事件。この事件で東区の三つの家族が避難を余儀なくされ、市壁の修繕に一年かかった。そして何より、この夜の混乱に乗じて神聖家が東区の土地を安値で買い占めた。\n\nニエ・リーには別の計画があった。\n\n黒雷炎虎は東門から入ろうとする。その前に、指定の場所に誘導できれば……彼は前日から仕込んでおいた匂いの痕跡を確認した。人族の血の匂いを模倣した薬剤。魔獣の嗅覚は正確だ。南東の廃倉庫に誘導できる。\n\n計画は八割方うまくいった。黒雷炎虎は倉庫に向かった。しかし残り二割——ニエ・リーが計算に入れていなかった変数として、葉紫雲が「魔獣を観察する」という名目で夜の外出をしていた。`,

  "6-3": `リン・ミンが真髄を理解し始めたのは、立方体の欠片を手に入れてから三週間後のことだった。\n\n鍛錬場で基礎練習を繰り返す中、彼は気づいた。同じ動作を繰り返すたびに、丹田の奥から微かなフィードバックがある。まるで自分の体が「ここは正しい」「ここは違う」と教えてくれるように。\n\n普通の修行者は感覚に頼る。優れた師匠に教わるか、自分の試行錯誤で気づくかのどちらかだ。しかしリン・ミンの場合、立方体の欠片が体内で何かを分析し、最適解を示してくれていた。\n\n「掌打を練習している」銀髪の少女、荀儿がまた声をかけてきた。「昨日より角度が変わった」「気づいた？」「あなたは毎回少しずつ違う。意図的に変えているの」「変化の中で正解を探している」リン・ミンは答えた。「師匠がいないから、自分で実験するしかない」荀儿は少し考えた。「私で良ければ、打ってみて」「師範代に対して？」「稽古相手として」それは彼女にとって珍しい申し出だった。リン・ミンは知らないが、荀儿がこうして声をかけた修行者は、彼が初めてだった。`,

  "6-4": `錬体の道と霊力の道。武の世界の根本にある二つの流れ。\n\nリン・ミンは図書室で古い文献を読んでいた。ほとんどの修行者は霊力の鍛錬を重視する。霊力が強ければ強いほど、使える技が増え、戦闘力が上がる。これは常識だ。\n\nしかし立方体の欠片は、常に体の方へ意識を向けさせる。筋肉の使い方、骨格の角度、呼吸のタイミング。霊力よりも、物理的な体の精度を求めているように感じる。\n\n「身体武者の系譜」という古い文献の中に、一節があった。「霊力は天から借りた力、身体は自らが積み上げた力。天が気まぐれを起こしても、己の肉体は裏切らない」\n\nリン・ミンはその一節を書き写した。何年も前に書かれた言葉が、今の自分の感覚と完全に一致していた。立方体の欠片は自分に何を教えようとしているのか。それはまだ分からない。しかし方向性は見えてきた気がした。`,

  "6-5": `初めての対外試合は、隣の宗派との友好演武大会だった。\n\nリン・ミンが選ばれたのは半ば偶然だった。本来は別の弟子が出るはずだったが、直前に怪我をした。補欠として名前があったのがリン・ミンだ。\n\n相手は雲霞派の弟子、年齢は同じく十五歳。霊力は銀階位下段。対するリン・ミンは銅階位。格差は明らかだ。\n\n試合が始まった。相手は迷わず霊力技能を使った。広範囲の衝撃波。リン・ミンは正面から受けず、側面に回った。最小限の動きで最大の位置取り。立方体から学んだ原則だ。\n\n三分後。リン・ミンは相手の腕を掴んでいた。投げた。霊力を使わず、純粋な体術で。相手は倒れ、立ち上がれなかった。\n\n観客は静まり返った。観衆の一人、雲霞派の長老が立ち上がった。「あの子の師匠は誰だ」「師匠はいません」宗派の長が答えた。「独学です」長老は首を傾げた。あの動きは独学で身につくものではない。しかし事実がそう言っている以上、信じるしかない。`,

  "7-3": `天毒珠が目覚めたのは、雲澈が修行を再開してから十日後だった。\n\n体内で静かに脈打つ感覚。初めての人は本能的に恐怖を感じる。しかし雲澈には前世の記憶がある。この感覚を、彼は知っている。\n\n天毒珠は単なる毒の容器ではない。それは浄化と変容の器だ。あらゆる毒を吸収し、変換し、最終的には力へと昇華させる。前世の雲澈は、この理解に至るまでに十年かかった。今世では、最初から知っている。\n\n彼は実験を始めた。庭の片隅に生えている毒草を一枚摘んだ。量は微量。指先で触れるだけ。天毒珠がわずかに温もりを持った。吸収している。\n\n前世で彼が行ったのと同じプロセスを、より安全に、より効率的に。毒を力に変える修行は、始まりの段階では危険を伴う。しかし段階を知っていれば、リスクを最小化できる。夜な夜な庭に出て、少しずつ修行を積む少年を、誰も気にしなかった。ただの変わり者の子供だと思われていた。`,

  "7-4": `青雲宗への入門試験は三段階ある。\n\n第一段階は霊力測定。第二段階は適性判定。第三段階は実技試験。雲澈が悩んだのは、どの段階でどれだけの実力を「見せるか」だった。\n\n見せすぎてはいけない。前世の経験から、あまりに早い時期に突出した才能を示すと、望まない注目を集める。特にこの宗派には、若い才能を潰すことに喜びを見出す者が複数いた。記憶にある顔が、警告として頭に浮かぶ。\n\nかといって見せなさすぎると入門できない。\n\n雲澈は計算した。入門できる最低ラインのわずか上。「期待されるが、脅威とは見られない」絶妙な位置。前世で身につけた演技力が、ここで活きる。\n\n第一段階の結果は「中の上」。試験官は満足した様子だった。第二段階で「風属性強め、火属性少し」という判定が出た。実際とは少し違うが、問題ない。第三段階では基本技能を丁寧に、しかし華やかさのない形で使った。\n\n合格。「普通の子が来た」という評価で。完璧だった。`,

  "7-5": `師範の于無涯が彼を呼んだのは、入門から一ヶ月後だった。\n\n于無涯は青雲宗でも特別な立ち位置にある人物だ。前世の記憶では、この人が雲澈の修行において重要な役割を果たした。そして後に、その関係が悲劇的な形で終わった。\n\n「お前の修行の様子を見ていた」于無涯は言った。「普通だと思っていたが、普通ではない」\n\n雲澈は警戒した。見抜かれたか。「何がそう見えるのでしょうか」「基本の動きが完成されすぎている。習いたての者の動きではない」師範の目は鋭かった。\n\n「昔、独学で少し……」「嘘をつくな」于無涯は穏やかに言った。「私はお前を試していない。ただ知りたいだけだ。お前は何者だ」\n\n雲澈は少し考えた。全てを話すことはできない。しかし全てを隠すのも難しい相手だ。「前の生で、修行していました」于無涯はしばらく黙っていた。「転生者か」彼の言葉には驚きよりも、確認するような静けさがあった。「そのような者に会ったのは初めてだ。続きを聞かせてくれるか」`,

  "8-3": `林雷は初めて魔法陣を描いた日のことを、おそらく生涯忘れないだろう。\n\n盤龍指輪の中に宿るドーリング・カウアートは、理論から教えることを好まなかった。「見て、感じて、やってみろ」が彼の基本方針だ。\n\n「魔法陣というのはな」ドーリングは言った。「世界への命令書だ。自然の法則に、一時的な例外を申請する。そのための言語が魔法陣の文字だ」林雷は羽ペンを手に取った。「どこから始めれば」「基礎の基礎から。風の偏向陣。これが描けなければ話にならない」\n\n最初の試みは完全な失敗だった。線が歪み、比率が狂い、魔力を流した瞬間に陣が崩壊した。爆発ではなく、静かに消えた。\n\n二十回目の試みで、微かな風が動いた。完全ではないが、機能した。ドーリングは何も言わなかったが、指輪がわずかに温もりを持った。それが彼の評価だと、林雷はなんとなく分かった。\n\n毎晩、他の生徒が寝た後、林雷は一人で魔法陣を練習した。宿舎の床、庭の地面、時には自分の掌の上にも。失敗を数えることをやめ、成功を数え始めた頃、上達の速度が変わった。`,

  "8-4": `エルンスト学院の図書室には、一般生徒が立ち入れない区画がある。\n\n林雷がそこに忍び込んだのは好奇心からではなく、必要に迫られてだった。ドーリングが参照するよう指示した文献が、その区画にしかないという。\n\n「魔法学の禁書区画には、過去の失敗の記録がある」ドーリングは言った。「なぜ封じたかを理解する方が、何を封じたかより重要だ」\n\n入るための方法は三つ。力ずくで突破する、管理者を騙す、または正規の許可を得る。林雷は三つ目を選んだ。院長の秘書に直談判した。「研究課題のために必要です。一時間だけ。監視付きでかまいません」\n\n許可は意外なほど早く下りた。秘書は言った。「院長が興味を持ったようです。一時間後、報告書を提出すること」\n\n区画に入った林雷は、最初の五分で目的の文献を見つけた。残りの五十五分、彼は別の本を読んでいた。「龍血武者の失われた記録」という、薄くて古い冊子。血族の歴史が、断片的に記されていた。`,

  "8-5": `父からの手紙が届いたのは、学期末試験の前日だった。\n\n内容は短い。「母の形見の指輪は大切にしているか」それだけだ。しかし林雷には分かる。これは父なりの確認だ。財政難が続く中、林雷が無事でいるかを問う、父の不器用な言葉。\n\n「指輪に反応しているな」ドーリングは言った。「感傷的なのか？」「少しだけ」「感傷は悪くない。ただし試験中は余計だ」\n\n試験は三科目。魔力理論、実技演習、そして戦術判断。林雷は理論では平均点を少し上回る程度の答案を出した。実技では風の偏向陣を完璧に描いた。それだけだ。派手なことは何もしない。\n\n戦術判断の試験で、問題が一つあった。「強力な敵が正面にいる。味方はあなた一人。取るべき行動を示せ」林雷は考えた。模範回答は「逃げる」か「待機して支援を待つ」だろう。しかし彼は別の答えを書いた。「敵の行動パターンを三回観察し、次の動きを予測した上で、最小のリスクで最大の情報を得る」試験官は長い間その答案を見つめた。`,

  "9-1": `シャオ・ヤンが霊力を失ったのは、三年前の冬至の夜のことだった。\n\n五才の頃から神童と呼ばれ、九才で六段の境地に達した。宗派内でも指折りの才能と言われ、父は誇らしげに、婚約者のシャオ・シュエは冷静な目で、仲間たちは羨ましそうに彼を見ていた。\n\nそれが一夜で消えた。\n\n今は十五歳。三年間、修行をしても霊力は伸びない。体内に残っているはずの霊力が、まるで砂に水を注ぐように消えていく。医師も、薬師も、宗派の長老も、原因を突き止められなかった。\n\nシャオ・ヤンは指輪を見た。亡き母の形見として受け継いだ古い指輪。何の変哲もない黒い石が嵌まっている。三年間、この指輪が何かを語りかけてくるような気がしていた。しかし毎回、空振りだった。\n\n今日が違ったのは、彼が初めて本気で諦めかけた日だったからかもしれない。「もう限界だ」と心の中で呟いた瞬間、指輪が光った。`,

  "9-2": `「ようやく話しかけてきたな」指輪の中から声がした。\n\n老人の声だ。しかし疲れた老人ではなく、長い眠りから目覚めた巨人のような声。シャオ・ヤンは部屋を見回した。誰もいない。声は確かに指輪から聞こえていた。\n\n「薬師です」老人は言った。「正確には、かつて薬師だった者。今は霊魂として、この指輪に宿っている。名前は薬老という」薬老。シャオ・ヤンはその名を聞いたことがない。「なぜ今まで黙っていた」「お前が本気で諦めるのを待っていた」「それはどういう意味ですか」「完全に空になった器でなければ、真の修行は始まらない。お前の才能への自信が、邪魔をしていた」\n\nシャオ・ヤンは座り込んだ。頭の中で多くのことが繋がっていく。霊力が消え続けた三年間。それは「失われた」のではなく、何かのために「準備された」のかもしれない。\n\n「俺の霊力はどこへ行った」「お前の体の中にある。ただし今の形では使えない。作り直す必要がある」「作り直す？」「そう。一から。しかし今度は、遥かに強固な基盤の上に」`,

  "9-3": `修行を再開した日から、シャオ・ヤンは変わった。外見的には何も変わらない。むしろ以前より静かになった。しかし目の奥に、以前にはなかった何かが灯っていた。\n\n薬老の指導は厳しかった。毎朝、夜明け前に起きる。身体鍛錬一時間。基礎呼吸法三時間。内功修行二時間。昼食後に薬草の知識を学ぶ。夕方に再び実技。就寝前に今日の課題を復習する。\n\n「薬師の修行もするのですか」シャオ・ヤンは驚いた。「霊力の道と薬の道は別物では」「お前は霊力だけで強くなろうとしている。それが以前の限界だ」薬老は言った。「霊力、身体、知識、すべてが揃って初めて真の修行者になれる」\n\n一ヶ月後、シャオ・ヤンは初めて炉を使って丹薬を作った。失敗した。炉が爆発した。幸い小型の炉だったので怪我はなかった。翌日また試みた。また失敗した。三日目に、かろうじて形になった丹薬が一つできた。「合格とは言えないが、最低限だ」薬老の評価はそれだけだった。シャオ・ヤンはそれで十分だと思った。`,

  "10-10": `学年末の総合評価で、タン・サンは十位内に入った。\n\n青霊学院の規模では、十位内は十分に上位だ。しかし彼が注目されたのは順位ではなく、評価の内訳だった。学科：平均的。実技：優秀。協調性：最高評価。特記事項：「判断力が際立って優秀。危機対応の指針になれる素質あり」\n\n担任から呼ばれた。「来年、別の学院への移籍を考えてみないか」「どこですか」「七怪学院。難しいが、お前の素質ならいける」七怪学院。前世の記憶がある。そこで出会う者たちを、彼は知っている。時期が来たということか。「考えてみます」「シャオ・ウーも同じことを勧めた」タン・サンは少し驚いた。「彼女も？」「あの子の武魂は、ここでは限界がある。一緒に進むなら、より高い場所に行くべきだ」タン・サンは頷いた。計画が、次の段階に進もうとしていた。`,

  "10-8": `タン・サンが二つ目の魂環を得たのは、学院の課外実習中だった。\n\n課外実習は毎年行われる。実際の魂獣が生息する森に入り、班ごとに活動する。タン・サンはシャオ・ウーと同じ班だった。五人編成。他の三人はあまり話したことがない同級生たちだ。\n\n森の中で班が分断された。魔獣の群れが現れ、散り散りになった。タン・サンとシャオ・ウーは二人で行動した。三時間後、五十年物の蛇魂獣と遭遇した。シャオ・ウーの武魂では苦手な相手だ。タン・サンが前に出た。\n\n戦いは長かった。しかし技術と前世の経験が、霊力の差を補った。魂獣が倒れた瞬間、二つ目の魂環が現れた。紫色の環。五十年物。これは予想より良い品質だ。「すごい」シャオ・ウーが言った。「次はあなたの番だ」タン・サンは言った。「私の？」「次の魂環を取る機会を一緒に探そう」二人の旅は、そこから本格的に始まった。`,

  "10-9": `シャオ・ウーが自分の武魂の能力を初めて全開にしたのは、危機の状況だった。\n\n帰路で、他学院の不良修行者グループに囲まれた。三対二。相手は明らかに喧嘩慣れしている。「その子の武魂を見せろ」と彼らは言った。シャオ・ウーの武魂の噂が広まっていたらしい。\n\nタン・サンが前に出た。「それは断る」交渉はすぐ決裂した。戦いが始まった瞬間、シャオ・ウーが動いた。前世の記憶にあるのと同じ動き。彼女の武魂の本当の力が出た時、相手は固まった。\n\n三人は逃げた。\n\n「ありがとう」タン・サンは言った。「何が」「守ってくれた」「あなたが先に動いてくれた」シャオ・ウーは少し考えた。「ねえ、あなたって不思議だ。なぜいつもそんなに落ち着いているの」「一度、似たような状況を経験したことがある気がするから」「気がする？」「そんな感じがする」それ以上の説明はしなかった。シャオ・ウーも聞き返さなかった。`,

  "11-10": `玄武道場での修行の最後の日、師範は珍しいことを言った。\n\n「お前は道場を卒業した。正式な修行者として認定する」一年半が経っていた。道場での基礎修行は、イー・ユンが計画していたものより内容が充実していた。\n\n「次はどこへ行く」師範は聞いた。「もう少し広い場所へ」「どこを考えている」「北の修行都市か、東の研究宗派か、まだ決めていません」「東の研究宗派か。そこは理論重視だ。実戦が薄くなる可能性がある」「分かっています。ただし知識の部分を補いたいので」師範は頷いた。「一つだけ忠告する。お前の動き方は、道場のものではない。どこかで別の修行を受けている。それを隠す理由は聞かない。ただし行く先では、それを活かしなさい」「はい」「良い旅を」イー・ユンは礼をした。次のステップへ。前世より早い準備で、今世の旅は始まる。`,

  "11-8": `道場での最初の本格的な試練は、半年後に来た。\n\n玄武道場の年に一度の試験。全師範が見ている中で、同学年の相手と試合する。イー・ユンは試験前夜に考えた。どのレベルで戦うか。\n\n前世の記憶では、この時期の標準的な修行者が持つ技量は分かっている。それと釣り合うように演じることが必要だ。\n\n試合が始まった。相手は道場内でも評判の良い少年だ。動きは正直で、基礎がしっかりしている。イー・ユンは相手を尊重して戦った。本気の七割。\n\n五分後、イー・ユンが勝った。判定ではなく、相手が参りを認めた形だ。師範の一人が言った。「良い試合だった。しかしお前、まだ余力があるだろう」「いいえ」「嘘だ。目が落ち着きすぎている」イー・ユンは少し考えた。この師範は鋭い。「少しだけ」と認めた。「なぜ隠した」「相手を傷つけたくなかったので」師範は首を傾げた。変わった子だ、と思った。`,

  "11-9": `道場の外の世界を初めて垣間見たのは、偶然だった。\n\n町の広場で、旅の修行者が公開演武をしていた。珍しい技を見せながら、観客から銅貨を集めるやり方だ。\n\nイー・ユンは足を止めた。演武の内容そのものより、旅の修行者の動き方を観察した。各地を旅して力をつけてきた者の動き。洗練されてはいないが、実戦から生まれた確かなものがある。道場の修行とは違う種類の技術だ。\n\n演武が終わった後、イー・ユンは旅の修行者に声をかけた。「一つ聞いてもいいですか」「子供が何だ」「その動き、どこで覚えましたか」旅の修行者は少し考えた。「各地で戦いながら」「どこが一番勉強になりましたか」「東の国境地帯。そこには様々な修行者が集まる。戦い方も様々だ」イー・ユンは頷いた。「ありがとうございます」「お前、修行者か」「始めたばかりです」「割にしっかりした目をしているな」旅の修行者は笑って去っていった。`,

  "12-10": `ムー・チェンが初めて「理法陣」の才能を見せたのは、事故のようなものだった。\n\n授業中、師範が複雑な霊力陣の問題を出した。「解けた者から提出」という課題だ。ムー・チェンは解いた。しかし他の生徒より速すぎた。三分。他の生徒は平均十五分かかる問題だ。\n\n「出し方が違う？」師範が解答用紙を見て首を傾げた。「この手順は教えていない」「自分で考えました」「どうやって」「最短経路を探す癖があるので」師範は解答を詳しく見た。確かに正しい。そして教科書の方法より効率が良い。「これはどこで習った」「習っていません。北方霊院では標準的な手順しか教えてもらえなかったので、自分で考えるしかなかった」師範は解答用紙を持って教室を出た。しばらくして戻ってきた。「副学長が話したいと言っている」ムー・チェンは頷いた。計画より早いが、隠し続けることにも限界がある。出るべき時は出る。`,

  "12-8": `ロロ・リンから修行効率化の方法を教えてほしいと言われた後、二人は週に一度話し合うようになった。\n\n彼女は頭が良い。説明すれば理解が早い。しかし育ちが違うせいか、「少ない資源で最大の効果を出す」という発想が抜けていた。豊かな環境で育てば当然だ。\n\n「なぜそういう考え方ができるの」ロロ・リンは聞いた。「資源が少なかったから」「北方霊院での話？」「追放される前から、そういう環境でした」「裕福ではなかった？」「家は普通です。ただ宗派内での立場が低かった。良い修行環境へのアクセスが限られていた」ロロ・リンはしばらく考えた。「私は逆だった。全てが揃っていたから、選ぶことに慣れていなかった」「今は？」「あなたと話すようになってから、優先順位を考えるようになった」これは双方向の学習だった。ムー・チェンにとっても、ロロ・リンから学べることは多かった。`,

  "12-9": `北嶺学院の中間評価が出た。\n\nムー・チェンの順位は中の上。目立たない位置だ。計算上はもう少し上に行けるが、あえて抑えた。まずは学院の仕組みを把握することが先だと判断した。\n\nロロ・リンは上位五位以内だった。「なぜあなたはこの順位なの」彼女は直接聞いた。「実力通りです」「違う。私は分かる。もっと上に行ける」ムー・チェンは少し考えた。「情報が少ない段階で目立つのはリスクがある」「リスク？」「学院の派閥、先輩との関係、長老の意向。北方霊院でそれを無視して失敗した経験がある」ロロ・リンは黙って考えた。「慎重なんだ」「そうです」「でもそれだと成長が遅くなるんじゃ」「見かけ上はそう見えるかもしれない。でも土台を固める時間だと思っている」ロロ・リンは頷いた。「分かった。教えてくれてありがとう。私の戦略も少し修正する」`,

  "2-10": `学院の外に出たのは、許可を得てのことだった。\n\n万族世界の外縁部、人族がかつて支配していたという「白古原」を調査するための許可証を、蘇宇は一ヶ月かけて申請した。何度も却下された。根拠のない研究、意義不明、危険性が高い。しかし粘り続け、最終的に副学長が「面白い」と判断して許可が下りた。\n\n白古原は荒れ地だ。草も生えない白い土地が、地平線まで続く。かつて何かがあった場所だということは、遺跡の痕跡が示している。蘇宇は地面に触れた。\n\n感じた。微かだが確かな何かを。人族の痕跡ではない。それより古い何かが、この土地の記憶に残っている。陳夏は計測器で土壌を調べていた。他の研究会のメンバーは周囲を観察している。\n\n「この土地は死んでいない」蘇宇は言った。「眠っているだけだ」彼は立ち上がり、白古原の中心に向かって歩き始めた。何かがある。まだ分からない。しかし確かに、ここに来るべき理由があった。`,

  "2-7": `試験の結果が掲示板に張り出された日、蘇宇は三十分待ってから見に行った。\n\n人混みが引いた頃、掲示板の前に立つ。上位十名のリストに自分の名前があった。七位。種族別では人族の中で唯一のランクインだ。他の九名は全て、特別な血統か種族技能を持つ者たちだった。\n\n「おめでとう」後ろから声がした。劉炎だった。「あなたが上位に入るとは思わなかった」「そうですか」「褒めているつもりなの」「ありがとうございます」劉炎は少し考えた。「放課後、一緒に修行しない？」蘇宇は驚いた。「なぜ」「あなたの意志力の鍛錬方法を見たい。竜族の体質に応用できないか試したくて」純粋な好奇心と研究心。蘇宇には分かった。「構いません。ただし私の方法は地味で時間がかかります」「構わない」「では明日の放課後に」二人の修行は、そこから始まった。`,

  "2-8": `人族研究会の発表会は、学院の小会議室で行われた。\n\n来たのは十二人。全員が人族だ。蘇宇は準備してきた資料を広げた。「上古人族の覚醒条件について」というタイトルで、三ヶ月の研究成果をまとめたものだ。\n\n発表は一時間かかった。途中で質問が何度も入った。皆、真剣に聞いていた。自分たちの種族の可能性について話す声を、これほど真剣に受け取ってもらえたのは、蘇宇には初めての経験だった。\n\n「本当に人族はまた立てると思う？」一人が聞いた。蘇宇は少し考えた。「可能性があると思う。方法が分かれば」「方法って何」「今研究中です。でも方向は見えてきた。意志の力を体系的に鍛える方法」陳夏が手を上げた。「私も参加していい？」「もちろん」その後、六人がさらに手を上げた。研究会は、その日から本格的に動き始めた。`,

  "2-9": `万族世界における「人族覚醒」の記録は、最後のものから千年が経っていた。\n\n蘇宇がその記録を見つけたのは、学院の最古の文書庫の中だった。整理もされていない古い書簡の束の中に、一枚の羊皮紙があった。「人族意志覚醒の証言」という見出し。\n\n内容は断片的だった。しかし核心部分は読み取れた。「完全な絶望の中でも意志が折れなかった時、人族の眠れる力が目覚める」\n\n完全な絶望。蘇宇は意志力試験のことを思い出した。五百という数値を叩き出した瞬間。あれは限界まで追い込まれた状況だった。意図せず、条件を満たしていたのかもしれない。\n\n「どうした」陳夏が隣で文書を覗き込んだ。「大事なことが分かったかもしれない」「何が」「人族の力が目覚める条件。ただし確認するには、もう一度極限状態に入る必要がある」「危険では」「段階的にやれば大丈夫なはず」陳夏は顔をしかめた。「蘇宇、あなたの『大丈夫』はいつも少し怖い」`,

  "3-10": `季節が変わり、街に新しい商人が来た。\n\n外来の商人だ。遠い都市から来たらしく、品物も普通とは違う。霊力を封じた道具、珍しい素材、そして複数の修行書籍。リー・チーウェイはその書籍を一冊一冊確認した。\n\n三番目の本に手が止まった。「大道源流考」という題。この本は前世でも希少だった。後の時代には完全に失われる書物だ。なぜここにあるのか。\n\n「いくらですか」「高いですよ」商人は言った。「見ての通り古い本ですが、内容が特別でして……」値段を聞いた。手元の金では足りない。「三日待ってもらえますか」「他に買い手が来なければ」リー・チーウェイは頷いた。三日で資金を工面する方法は、いくつか思いついていた。\n\n老人に声をかけたのは翌日だ。「一つ仕事をさせてください。対価として金銭を」「何の仕事だ」「街の東の土地の霊脈を調べること。地主が困っているはずです」「なぜ知っている」「見れば分かります」老人は首を傾げた。「本当に不思議な子だ」`,

  "3-6": `リー・チーウェイが街の子供たちと話すようになったのは、自然な流れだった。\n\n彼の言動が「奇妙だが危険ではない」と分かってきた頃、近所の子供たちが近寄ってきた。学校の帰り道に数人が声をかけ、いつの間にか集まるようになった。\n\nリー・チーウェイは話すことが嫌いではない。ただし中身のある話が好きだ。子供たちの素朴な質問に、彼は丁寧に答えた。「なぜ空は青いの」「なぜ川は流れるの」「強い修行者になるにはどうすればいい」\n\n最後の質問だけ、彼は少し考えた。「なりたい理由による」「守りたい人がいるから」「それは良い理由だ。では毎日、その人のことを考えながら修行しなさい。力は目的と結びついた時、最も育つ」子供たちは頷いた。十億年の知恵が、子供向けに圧縮された形で伝わっていた。`,

  "3-7": `城の南に、廃寺があった。\n\n誰も近づかない。霊気が淀んでいる、幽霊が出る、昔何かが起きた場所だ、と様々な噂がある。リー・チーウェイは興味を持った。\n\n廃寺に入った瞬間、分かった。ここは昔、修行の場だった。しかも相当な高位の修行者が使っていた形跡がある。建物は朽ちているが、床の石畳に刻まれた文様は残っている。修行陣の痕跡だ。\n\n彼は三時間かけて寺を調べた。地下室があった。梯子は腐っていたが、降りた先に小さな石室がある。部屋の中央に祭壇。その上に、ほこりをかぶった小箱があった。\n\n箱を開けた。中には羊皮紙が一枚。文字が書かれている。古い言語だが、リー・チーウェイには読める。十億年の記憶には、あらゆる時代の言語が含まれている。\n\n「修行者よ、この場所を見つけた者へ。貴方が真の求道者であるならば、この法を授ける」彼は静かに読み続けた。廃寺は、予想外の宝庫だった。`,

  "3-8": `法の継承は三日かかった。\n\n廃寺の石室で、リー・チーウェイは羊皮紙に記された法を読み込んだ。内容は「虚空体悟法」という修行術だ。この時代にはまだ知られていない、失われた系統の修行方法。\n\n内容を記憶するだけなら一時間もあれば十分だ。しかし理解には時間がかかる。表面的な技法だけでなく、その根底にある原理を完全に把握することが必要だ。リー・チーウェイは急がなかった。\n\n三日目の夜、彼は石室の中で目を開けた。理解は完成した。この法は彼が前世で習得した大いなる道の系統に属する修行術だ。完成度は低い。おそらく数百年前の修行者が不完全な形で記したのだろう。しかし方向性は正しい。\n\n彼は自分の修行に組み込むことにした。不完全な部分は補える。自分の記憶の中に、この法を完成させるための要素がある。廃寺を出る時、彼は石室の入り口を元の状態に戻した。次に来るべき人のために。`,

  "3-9": `古老がまた現れた。今度は廃寺の前で待っていた。\n\nリー・チーウェイは驚かなかった。この老人が只者でないことは分かっている。廃寺に人が入ったことを察知できるということは、それなりの感知能力があるということだ。\n\n「三日間、中に何があった」老人は聞いた。「古い法書です」「それをどうした」「読みました」「それだけか」「理解しました」老人は長い沈黙の後、言った。「虚空体悟法は、二百年前に最後の継承者が死んで以来、失われたと思われていた」「記録は残っていました」「お前に読めたのか」「はい」また沈黙。老人の目に複雑な感情が浮かんだ。「それをどこで習得した」「前の縁です」「またその言葉か」老人は溜め息をついた。「お前との縁は、私にとって修行になりそうだ」リー・チーウェイは微笑んだ。「それは光栄です」`,

  "4-10": `翌夜、施設を制圧した。\n\nアルヴェスとミラ、それにミラが呼んだグレイ・マント協会の調査員二名の計四名。アルヴェスが結界を外し、ミラたちが突入する。アルヴェス自身は入り口で待機し、逃走者を封じる役割だ。\n\n作戦は三十分で完了した。施設内の警備員は八名。全員が無力化され、拘束された。研究者たちも確保。三人の商人は解放された。\n\n「完璧でした」ミラは報告書を書きながら言った。「私の部下が動けたのはあなたの結界解析があったからです」「当然だ。それが仕事だ」「一つ聞いていいですか」「何だ」「なぜ引き受けてくれたのですか。リッチがこういう仕事を」アルヴェスは少し間を置いた。「リッチにも利益がある」「具体的には？」「情報だ。世界がどう動いているかを知ることが、私の最大の防衛手段だ。あなたたちの仕事に関わることで、私は多くを知れる」ミラは頷いた。「では、また依頼しても？」「条件次第だ」`,

  "4-6": `研究者の救出から一週間後、ミラは新しい依頼を持ってきた。\n\n「失踪した商人の調査です」彼女は書類を広げた。「三人の商人が同じ街道で行方不明になっています。共通点は全員が同じ業者から荷物を受け取っていた点」アルヴェスは書類を見た。「単純な強盗ではないな」「ええ。荷物の中身が問題で、全て特定の薬草です。大量の、特定の薬草」「何のための薬草か分かっているか」「分かっていれば、こちらで解決できます」アルヴェスは骨の指を組んだ。「私のネットワークで死者に聞ける範囲を確認しよう。ただし今回は一つ条件がある」「何ですか」「現場に同行すること。情報収集だけでなく、実地調査が必要だ」ミラは少し考えた。「分かりました」これが彼らの二度目の共同作業の始まりだった。`,

  "4-7": `街道の現場調査は夜に行われた。\n\nアルヴェスは死のオーラを完全に抑制した状態でミラと並んで歩いた。普通に見れば老齢の人間と若い研究者の二人連れだ。怪しまれる要素はない。\n\n「ここで最初の商人が消えた」ミラは地図を見ながら言った。「次のポイントは五百メートル先」アルヴェスは地面に手をついた。魔力の残滓を感知する。「何かあった。最近ではない。しかし定期的に魔法が使われている形跡だ」「定期的に？」「週に一度程度。正確に。これは習慣的な行為だ」ミラは手帳に記録した。「施設がある可能性が高い」「その通りだ。隠蔽結界を張って定期的に魔法を使う施設。目的は分からないが、規模は相当なものだろう」アルヴェスは立ち上がった。「明日の夜、範囲を広げて調べる。今日は情報収集だ」「帰りますか」「いや、もう一か所」彼は街道を外れ、森の中へ歩き始めた。「ついてこられるか」「もちろん」ミラは迷わずついていった。`,

  "4-8": `森の中に、隠された扉があった。\n\n地面に埋め込まれた石板。見た目は岩の一部だが、特定の魔力パターンで反応する仕掛けだ。アルヴェスが感知したのは、この石板が先週使われた時の残滓だ。\n\n「開けられますか」ミラが聞いた。「解析に三十分は必要だ」「その間、私は周囲を警戒します」「頼む」アルヴェスは石板に集中した。術式の構造を分析する。なかなか複雑だ。作った者はかなりの腕前だ。ただし、四百年の経験から見れば、幾つか見慣れたパターンがある。\n\n二十二分後、扉が開いた。地下への階段。奥から微かな明かりが見える。ミラが隣に来た。「さすがです」「ただし中には人がいる。生きている人間が複数」「消えますか」「二人とも消える方が安全だ」「私には消える術がありません」「私の影に入れ」ミラは一瞬だけためらった。リッチの影に入るという状況の奇妙さを考えた。しかし実用性は明確だ。「お願いします」`,

  "4-9": `地下施設は予想より大規模だった。\n\n五つの部屋。各部屋に設備。三人の研究者らしき人間と、数名の警備員。そして奥の部屋に、大型の錬成装置。アルヴェスはミラの肩を借りて素早く全体を把握した。\n\n「何を作っている」ミラが小声で聞いた。「薬草から特定の成分を抽出している。市場では禁止されている成分だ」「何に使う薬ですか」「修行者の感知能力を一時的に麻痺させる薬だ。検問を通り抜けるために使われる」ミラは顔を硬くした。これは思っていたより大きな話だ。「行方不明の商人は」「あそこ」奥の一室。三人の商人が拘禁されていた。「解放できますか」「できる。ただし今夜は偵察だ。施設の全容を把握してから行動する」「商人たちは今夜帰れない？」「安全のためだ。情報なしに動けば、別の危険が生じる」ミラは歯を食いしばった。「分かりました。しかし今夜中に計画を立てます」「賛成だ」`,

  "5-10": `グローリー・シティの防衛評議会に、若い提案者が現れた。\n\nニエ・リーではない。彼が資料を提供し、別の人間が提案者として立った。ニエ・リーが直接動くには、まだ早い。しかし情報だけを持っていても意味がない。適切な経路で適切な人に届ける必要がある。\n\n提案の内容は「南方魔獣の移動パターンの変化について」だ。ニエ・リーが二ヶ月かけて収集したデータを整理したものだ。具体的な数値と記録日時がある。防衛隊の担当者は最初、懐疑的だった。しかし数値の精度と、実際の観察記録の一致度を見て、態度が変わった。\n\n翌日、防衛隊の一部が南方調査に派遣された。三日後に戻ってきた彼らは、記録と実態が一致していることを確認した。\n\n評議会での評価は静かに高まった。誰が情報源かは分からない。しかし正確だ。それだけで十分だった。ニエ・リーは日常生活を続けながら、少しずつ盤面を整えていた。`,

  "5-6": `ニエ・リーが錬丹の腕を「公開」する機会を選んだのは慎重にだった。\n\n学院の薬剤師が病で倒れた。通常業務に支障が出ている。誰かが代わりに軽傷者向けの基礎回復薬を作る必要がある。院生ボランティアを募集した。\n\nニエ・リーが応募した。試験として基礎の丹薬を一つ作るよう言われた。彼は丁寧に、しかし意図的に「見習いとして上手い」というレベルに合わせて作った。速すぎず、遅すぎず。品質は良いが、奇跡的ではない。\n\n担当の先生は合格を出した。「薬師の才能があるね。修行者の道とは別に、薬師も検討してはどうか」「考えてみます」ニエ・リーは答えた。本音では両方が既に計画の中に入っている。修行者と薬師、そして将来的には錬丹師まで。一つの分野だけでは足りない。前世の自分がそれで何度も壁にぶつかったことを、よく知っているから。`,

  "5-7": `聖獣の痕跡を発見したのは、魔獣の森の調査中だった。\n\n学院の公式調査隊に同行する許可を取った。本来は上級生が参加するものだが、ニエ・リーは「薬草収集の研究」という名目で特例を申請した。担当教師が認めたのは、最近の錬丹の実績があったからだろう。\n\n森の奥。通常の調査範囲を少し超えたところ。ニエ・リーは地面に膝をついた。草が特定のパターンで踏まれている。この跡を、彼は知っていた。前世の記憶に刻まれた、聖き魔獣の移動痕だ。\n\nこの聖獣は前世では十年後に現れた。しかし今世では何かが変わったのか、予定より早く活動しているらしい。ニエ・リーは観察を続けた。聖獣との関係をどう作るか、慎重に考えなければならない。これは後の旅において重要な要素になる。焦らず、しかし見逃さず。`,

  "5-8": `葉紫雲と二人で修行した夜、ニエ・リーは初めて自分の過去の一部を話した。\n\n「前世のことを覚えている」彼は言った。「どういう意味」「文字通りの意味だ。以前の人生の記憶が全部ある」葉紫雲は長い間黙っていた。驚きか、不信か、何を考えているか分からない。「信じない？」「……分からない。でも、だから最初からこんなに落ち着いているのね」「そう」「怖くないの？　もう一度死ぬことが」ニエ・リーは少し考えた。「前世では守れなかったものがある。それが怖い。もう一度同じ失敗をすることが」葉紫雲は彼を見た。「何を守れなかったの」「この街。そして……」彼は続けるのをやめた。「それ以上は言えない。でも今世では違う結末にするつもりだ」葉紫雲はしばらく空を見上げた。「私は……あなたのことを信じてもいいかもしれない」`,
